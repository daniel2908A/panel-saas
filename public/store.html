<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora Store</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
}

.logo {
  width: 150px;
}

.logout {
  background: red;
  border: none;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: rgba(30,41,59,0.8);
  padding: 25px;
  border-radius: 15px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 10px rgba(0,255,150,0.1);
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(0,255,150,0.3);
}

.card h2 {
  color: #4ade80;
}

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #1e293b;
  padding: 30px;
  border-radius: 15px;
  width: 320px;
}

.plan {
  background: #334155;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: linear-gradient(45deg, #22c55e, #16a34a);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: white;
}

button:hover {
  transform: scale(1.05);
}
</style>

</head>
<body>

<div class="header">
  <img src="/img/logo.png" class="logo">
  <button class="logout" onclick="logout()">Salir</button>
</div>

<div class="grid" id="productos">Cargando...</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="productName"></h3>
    <div id="planes"></div>
    <button onclick="cerrar()">Cerrar</button>
  </div>
</div>

<script>

const TOKEN = localStorage.getItem("token");

// =======================
// PROTECCIÓN
// =======================
if (!TOKEN || TOKEN.length < 20) {
  localStorage.removeItem("token");
  window.location.href = "/login.html";
}

// =======================
// LOGOUT
// =======================
function logout() {
  localStorage.removeItem("token");
  window.location.href = "/login.html";
}

// =======================
// CARGAR PRODUCTOS
// =======================
async function cargarProductos() {
  try{
    const res = await fetch('/api/products', {
      headers: { 'Authorization': 'Bearer ' + TOKEN }
    });

    if(!res.ok) throw new Error("Error productos");

    const productos = await res.json();

    const container = document.getElementById("productos");
    container.innerHTML = "";

    productos.forEach(p => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `<h2>${p.name}</h2>`;
      div.onclick = () => verPlanes(p.id, p.name);
      container.appendChild(div);
    });

  }catch(err){
    console.error(err);
    document.getElementById("productos").innerHTML = "❌ Error cargando productos";
  }
}

// =======================
// VER PLANES
// =======================
async function verPlanes(productId, name) {
  try{
    modal.style.display = "flex";
    productName.innerText = name;

    const res = await fetch(`/api/plans/${productId}`, {
      headers: { 'Authorization': 'Bearer ' + TOKEN }
    });

    if(!res.ok) throw new Error("Error planes");

    const planes = await res.json();

    planesDiv.innerHTML = "";

    planes.forEach(plan => {
      const div = document.createElement("div");
      div.className = "plan";

      div.innerHTML = `
        ${plan.name} - $${plan.price}
        <button onclick="comprar(${plan.id})">Comprar</button>
      `;

      planesDiv.appendChild(div);
    });

  }catch(err){
    console.error(err);
    alert("Error cargando planes");
  }
}

// =======================
// COMPRAR
// =======================
async function comprar(planId) {
  try{
    if (!confirm("¿Confirmar compra?")) return;

    const res = await fetch('/api/orders/buy', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + TOKEN
      },
      body: JSON.stringify({ planId })
    });

    if(!res.ok) throw new Error("Error compra");

    const data = await res.json();

    if (data.account) {
      alert(`🔥 Compra exitosa

Usuario: ${data.account.username}
Password: ${data.account.password}`);
    } else {
      alert(data.error || "Error en compra");
    }

    cerrar();

  }catch(err){
    console.error(err);
    alert("Error procesando compra");
  }
}

// =======================
// CERRAR MODAL
// =======================
function cerrar() {
  modal.style.display = "none";
}

// =======================
// INIT
// =======================
const modal = document.getElementById("modal");
const productName = document.getElementById("productName");
const planesDiv = document.getElementById("planes");

cargarProductos();

</script>

</body>
</html>
