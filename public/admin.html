<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora Owner Panel</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#020617;color:white;}
header{display:flex;justify-content:space-between;align-items:center;padding:15px;background:#111827;color:white;}
button{padding:8px 12px;background:red;color:white;border:none;border-radius:6px;cursor:pointer;}
.container{padding:20px;}
.card{background:#1f2937;padding:15px;border-radius:8px;margin-bottom:15px;}
button.credit-btn{margin:2px;padding:4px 6px;border:none;border-radius:4px;cursor:pointer;}
button.plan-btn{margin:2px;padding:4px 6px;border:none;border-radius:4px;background:#f59e0b;color:white;cursor:pointer;}
</style>
</head>
<body>

<header>
  <h1>👑 Nexora Owner Panel</h1>
  <button onclick="logout()">Cerrar sesión</button>
</header>

<div class="container" id="users-container">
  <p id="loading">Cargando usuarios...</p>
</div>

<script>
// Logout
function logout(){
  localStorage.removeItem('token');
  window.location.href = '/login.html';
}

// Load users after DOM is ready
document.addEventListener('DOMContentLoaded', async () => {
  const token = localStorage.getItem('token');
  if(!token){
    window.location.href = '/login.html';
    return;
  }
  await loadUsers(token);
});

// Fetch users
async function loadUsers(token){
  const res = await fetch('/api/users',{
    method:'GET',
    headers:{
      'Authorization':'Bearer ' + token,
      'Content-Type':'application/json'
    }
  });

  if(res.status===403){
    alert("No tienes permisos para ver esta página");
    logout();
    return;
  }

  if(!res.ok) throw new Error("Error cargando usuarios");

  const users = await res.json();
  const container = document.getElementById('users-container');
  container.innerHTML = '';

  users.forEach(user => {
    const div = document.createElement('div');
    div.className='card';
    div.innerHTML=`
      <strong>${user.email}</strong> (${user.role})<br>
      🪙 Créditos: $${user.credits || 0}<br>
      <div>
        <button class="credit-btn" onclick="updateCredits(${user.id},5)">+5</button>
        <button class="credit-btn" onclick="updateCredits(${user.id},10)">+10</button>
        <button class="credit-btn" onclick="updateCredits(${user.id},20)">+20</button>
        <button class="credit-btn" onclick="updateCredits(${user.id},50)">+50</button>
        <button class="credit-btn" onclick="updateCredits(${user.id},-5)" style="background:red">-5</button>
        <button class="credit-btn" onclick="updateCredits(${user.id},-10)" style="background:red">-10</button>
      </div>
      <div>
        <button class="plan-btn" onclick="updatePlan(${user.id},1)">1 Mes</button>
        <button class="plan-btn" onclick="updatePlan(${user.id},3)">3 Meses</button>
        <button class="plan-btn" onclick="updatePlan(${user.id},6)">6 Meses</button>
        <button class="plan-btn" onclick="updatePlan(${user.id},12)">12 Meses</button>
      </div>
    `;
    container.appendChild(div);
  });
}

// Update credits
async function updateCredits(userId, amount){
  const token = localStorage.getItem('token');
  const res = await fetch(`/api/user/${userId}/credits`,{
    method:'POST',
    headers:{
      'Authorization':'Bearer '+token,
      'Content-Type':'application/json'
    },
    body:JSON.stringify({amount})
  });
  if(res.ok) loadUsers(token);
  else alert("Error actualizando créditos");
}

// Update plan
async function updatePlan(userId, months){
  const token = localStorage.getItem('token');
  const res = await fetch(`/api/user/${userId}/plan`,{
    method:'POST',
    headers:{
      'Authorization':'Bearer '+token,
      'Content-Type':'application/json'
    },
    body:JSON.stringify({months})
  });
  if(res.ok) loadUsers(token);
  else alert("Error actualizando plan");
}
</script>

</body>
</html>
