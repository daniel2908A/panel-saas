<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora Admin</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#020617;color:white;}
header{display:flex;justify-content:space-between;align-items:center;padding:15px;background:#111827;color:white;}
button{padding:8px 12px;background:red;color:white;border:none;border-radius:6px;cursor:pointer;}
.container{padding:20px;}
.card{background:#1f2937;padding:15px;border-radius:8px;margin-bottom:15px;}
button.credit-btn{margin:2px;}
button.plan-btn{margin:2px;background:#f59e0b;}
</style>
</head>
<body>

<header>
  <h1>👑 Nexora Admin</h1>
  <button onclick="logout()">Cerrar sesión</button>
</header>

<div class="container" id="users-container">
  <p id="loading">Cargando usuarios...</p>
</div>

<script>
function logout(){
  localStorage.removeItem('token');
  window.location.href = '/login.html';
}

document.addEventListener('DOMContentLoaded', async () => {
  const token = localStorage.getItem('token');
  if(!token){
    window.location.href = '/login.html';
    return;
  }

  try {
    await loadUsers(token);
  } catch(err){
    console.error(err);
    document.getElementById('users-container').innerHTML = `<p style="color:red">Error cargando usuarios</p>`;
  }
});

async function loadUsers(token){
  const res = await fetch('/api/users', {
    method: 'GET',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json'
    }
  });

  if(res.status === 403){
    alert("No tienes permisos para ver esta página");
    window.location.href = '/login.html';
    return;
  }

  if(!res.ok) throw new Error("Error cargando usuarios");

  const users = await res.json();
  const container = document.getElementById('users-container');
  container.innerHTML = '';

  users.forEach(user => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <strong>${user.email}</strong> (${user.role})<br>
      🪙 Créditos: $${user.credits || 0}<br>
      <div>
        <button class="credit-btn">+5</button>
        <button class="credit-btn">+10</button>
        <button class="credit-btn">+20</button>
        <button class="credit-btn">+50</button>
      </div>
      <div>
        <button class="credit-btn" style="background:red">-5</button>
        <button class="credit-btn" style="background:red">-10</button>
      </div>
      <div>
        <button class="plan-btn">1 Mes</button>
        <button class="plan-btn">3 Meses</button>
        <button class="plan-btn">6 Meses</button>
        <button class="plan-btn">12 Meses</button>
      </div>
    `;
    container.appendChild(div);
  });
}
</script>

</body>
</html>
