<script>
// Logout
function logout(){
  localStorage.removeItem('token');
  window.location.href = '/login.html';
}

// Load users
document.addEventListener('DOMContentLoaded', async () => {
  await loadUsers(); // 🔥 sin token
});

// Fetch users
async function loadUsers(){
  try {
    const res = await fetch('/api/users'); // 🔥 SIN headers

    if(!res.ok) throw new Error("Error cargando usuarios");

    const users = await res.json();

    console.log("USUARIOS:", users); // 👈 DEBUG

    const container = document.getElementById('users-container');
    container.innerHTML = '';

    users.forEach(user => {
      const div = document.createElement('div');
      div.className='card';
      div.innerHTML=`
        <strong>${user.email}</strong> (${user.role})<br>
        🪙 Créditos: $${user.credits || 0}<br>
        <div>
          <button onclick="updateCredits(${user.id},5)">+5</button>
          <button onclick="updateCredits(${user.id},10)">+10</button>
          <button onclick="updateCredits(${user.id},20)">+20</button>
          <button onclick="updateCredits(${user.id},50)">+50</button>
          <button onclick="updateCredits(${user.id},-5)" style="background:red">-5</button>
          <button onclick="updateCredits(${user.id},-10)" style="background:red">-10</button>
        </div>
      `;
      container.appendChild(div);
    });

  } catch (err) {
    console.error(err);
    document.getElementById('users-container').innerHTML = "❌ Error cargando usuarios";
  }
}

// Update credits (lo dejamos igual)
async function updateCredits(userId, amount){
  const res = await fetch(`/api/user/${userId}/credits`,{
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body:JSON.stringify({amount})
  });

  if(res.ok) loadUsers();
  else alert("Error actualizando créditos");
}
</script>
