<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nexora Owner Panel</title>
  <style>
    body { background:#0b1220; color:white; font-family:sans-serif; }
    .card { background:#1e293b; padding:15px; margin:10px 0; border-radius:10px; }
    button { margin:5px; padding:5px 10px; }
  </style>
</head>
<body>

<h1>👑 Nexora Owner Panel</h1>
<button onclick="logout()">Cerrar sesión</button>

<!-- 🔥 AQUÍ VA EL CONTENEDOR (ESTE ERA EL ERROR) -->
<div id="users-container">
  Cargando usuarios...
</div>

<script>
// Logout
function logout(){
  localStorage.removeItem('token');
  window.location.href = '/login.html';
}

// Load users
document.addEventListener('DOMContentLoaded', async () => {
  await loadUsers();
});

// Fetch users
async function loadUsers(){
  try {
    const res = await fetch('/api/users');

    if(!res.ok) throw new Error("Error cargando usuarios");

    const users = await res.json();

    console.log("USUARIOS:", users);

    const container = document.getElementById('users-container');

    if (!container) {
      console.error("No existe users-container");
      return;
    }

    container.innerHTML = '';

    users.forEach(user => {
      const div = document.createElement('div');
      div.className='card';
      div.innerHTML=`
        <strong>${user.email}</strong> (${user.role})<br>
        🪙 Créditos: $${user.credits || 0}<br>
        <div>
          <button onclick="updateCredits(${user.id},5)">+5</button>
          <button onclick="updateCredits(${user.id},10)">+10</button>
          <button onclick="updateCredits(${user.id},20)">+20</button>
          <button onclick="updateCredits(${user.id},50)">+50</button>
          <button onclick="updateCredits(${user.id},-5)" style="background:red">-5</button>
          <button onclick="updateCredits(${user.id},-10)" style="background:red">-10</button>
        </div>
      `;
      container.appendChild(div);
    });

  } catch (err) {
    console.error(err);
    const container = document.getElementById('users-container');
    if(container) container.innerHTML = "❌ Error cargando usuarios";
  }
}

// Update credits
async function updateCredits(userId, amount){
  const res = await fetch(`/api/user/${userId}/credits`,{
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body:JSON.stringify({amount})
  });

  if(res.ok) loadUsers();
  else alert("Error actualizando créditos");
}
</script>

</body>
</html>
