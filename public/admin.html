<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nexora Owner Panel</title>
  <style>
    body { background:#0b1220; color:white; font-family:sans-serif; }
    .card { background:#1e293b; padding:15px; margin:10px 0; border-radius:10px; }
    button { margin:5px; padding:5px 10px; cursor:pointer; }
    img { margin-top:10px; border-radius:8px; }
  </style>
</head>
<body>

<h1>👑 Nexora Owner Panel</h1>
<button onclick="logout()">Cerrar sesión</button>

<div id="users-container">
  Cargando usuarios...
</div>

<script>

// =======================
// LOGOUT
// =======================
function logout(){
  localStorage.removeItem('token');
  window.location.href = '/login.html';
}

// =======================
// LOAD USERS
// =======================
document.addEventListener('DOMContentLoaded', async () => {
  await loadUsers();
});

// =======================
// GET USERS
// =======================
async function loadUsers(){
  try {
    const res = await fetch('/api/users');

    if(!res.ok) throw new Error("Error cargando usuarios");

    const users = await res.json();

    const container = document.getElementById('users-container');
    container.innerHTML = '';

    users.forEach(user => {
      const div = document.createElement('div');
      div.className='card';

      div.innerHTML=`
        <strong>${user.email}</strong> (${user.role})<br>
        🪙 Créditos: $${user.credits || 0}<br>
        📌 Estado: ${user.status || "pending"}<br>

        <div>
          <button onclick="updateCredits(${user.id},5)">+5</button>
          <button onclick="updateCredits(${user.id},10)">+10</button>
          <button onclick="updateCredits(${user.id},20)">+20</button>
          <button onclick="updateCredits(${user.id},50)">+50</button>
          <button onclick="updateCredits(${user.id},-5)" style="background:red">-5</button>
          <button onclick="updateCredits(${user.id},-10)" style="background:red">-10</button>
        </div>

        <div>
          <button onclick="activar(${user.id})" style="background:green">
            ✅ Activar usuario
          </button>
        </div>

        <div>
          ${user.proof 
            ? `<img src="/uploads/${user.proof}" width="100%">`
            : "❌ Sin comprobante"}
        </div>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    console.error(err);
    document.getElementById('users-container').innerHTML = "❌ Error cargando usuarios";
  }
}

// =======================
// ACTIVAR USUARIO
// =======================
async function activar(userId){
  try{
    const res = await fetch(`/api/users/activate/${userId}`, {
      method: "POST"
    });

    if(!res.ok) throw new Error();

    alert("Usuario activado correctamente");

    loadUsers();

  }catch(err){
    console.error(err);
    alert("Error activando usuario");
  }
}

// =======================
// CREDITOS
// =======================
async function updateCredits(userId, amount){
  const res = await fetch(`/api/user/${userId}/credits`,{
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body:JSON.stringify({amount})
  });

  if(res.ok) loadUsers();
  else alert("Error actualizando créditos");
}

</script>

</body>
</html>
