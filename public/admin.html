<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nexora Admin Panel</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: white;
  padding: 20px;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

h1 { color: gold; }

.card {
  background: rgba(30,41,59,0.9);
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 12px;
}

button {
  padding: 8px;
  margin: 3px;
  border: none;
  cursor: pointer;
  color: white;
  border-radius: 6px;
}

.btn-green { background: #22c55e; }
.btn-orange { background: #f59e0b; }
.logout { background: red; }

.user-card {
  margin-bottom: 10px;
  padding: 12px;
  background: #334155;
  border-radius: 8px;
}
</style>

</head>
<body>

<div class="header">
  <h1>👑 Nexora Admin</h1>
  <button class="logout" onclick="logout()">Cerrar sesión</button>
</div>

<div class="card">
<h3>Usuarios</h3>
<div id="users"></div>
</div>

<script>
const TOKEN = localStorage.getItem("token");

// 🔒 protección
if (!TOKEN) {
  window.location.href = "/login.html";
}

// 🔓 logout
function logout() {
  localStorage.removeItem("token");
  window.location.href = "/login.html";
}

// 🔥 ACTIVAR SUPER RESELLER
async function activarSuper(userId, months) {
  const res = await fetch('/api/admin/activar-superreseller', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + TOKEN
    },
    body: JSON.stringify({ userId, months })
  });

  const data = await res.json();

  alert(data.message || data.error);
  cargarUsers();
}

// 💰 créditos
async function addCredits(userId, amount) {
  const res = await fetch('/api/admin/add', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + TOKEN
    },
    body: JSON.stringify({ userId, amount })
  });

  const data = await res.json();

  alert(data.message || data.error);
  cargarUsers();
}

// 👥 cargar usuarios
async function cargarUsers() {
  const res = await fetch('/api/admin/users', {
    headers: { 'Authorization': 'Bearer ' + TOKEN }
  });

  const data = await res.json();

  users.innerHTML = "";

  data.forEach(u => {
    const div = document.createElement("div");
    div.className = "user-card";

    div.innerHTML = `
      <b>${u.username}</b> (${u.role})  
      <br>💰 Créditos: $${u.credits || 0}
      <br><br>

      <!-- 💰 BOTONES CRÉDITOS -->
      <button class="btn-green" onclick="addCredits(${u.id}, 5)">+5</button>
      <button class="btn-green" onclick="addCredits(${u.id}, 10)">+10</button>
      <button class="btn-green" onclick="addCredits(${u.id}, 15)">+15</button>
      <button class="btn-green" onclick="addCredits(${u.id}, 20)">+20</button>
      <button class="btn-green" onclick="addCredits(${u.id}, 30)">+30</button>
      <button class="btn-green" onclick="addCredits(${u.id}, 50)">+50</button>
      <button class="btn-green" onclick="addCredits(${u.id}, 100)">+100</button>

      <br><br>

      <!-- 🔥 BOTONES PLAN -->
      <button class="btn-orange" onclick="activarSuper(${u.id}, 1)">1 Mes</button>
      <button class="btn-orange" onclick="activarSuper(${u.id}, 3)">3 Meses</button>
      <button class="btn-orange" onclick="activarSuper(${u.id}, 6)">6 Meses</button>
      <button class="btn-orange" onclick="activarSuper(${u.id}, 12)">12 Meses</button>
    `;

    users.appendChild(div);
  });
}

// 🚀 iniciar
window.onload = cargarUsers;
</script>

</body>
</html>
