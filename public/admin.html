<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nexora Owner Panel</title>

  <style>
    body {
      background:#0b1220;
      color:white;
      font-family:sans-serif;
    }

    .card {
      background:#1e293b;
      padding:15px;
      margin:10px 0;
      border-radius:10px;
    }

    button {
      margin:5px;
      padding:6px 10px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      color:white;
    }

    .green { background:#22c55e; }
    .red { background:#ef4444; }
    .blue { background:#3b82f6; }
    .gray { background:#64748b; }

    .status-active {
      color:#22c55e;
      font-weight:bold;
    }

    .status-inactive {
      color:#ef4444;
      font-weight:bold;
    }
  </style>
</head>

<body>

<h1>👑 Nexora Owner Panel</h1>
<button onclick="logout()" class="gray">Cerrar sesión</button>

<div id="users-container">Cargando usuarios...</div>

<script>

// =======================
// LOGOUT
// =======================
function logout(){
  localStorage.removeItem('token');
  window.location.href = '/login.html';
}

// =======================
// LOAD USERS
// =======================
document.addEventListener('DOMContentLoaded', loadUsers);

// =======================
// GET USERS
// =======================
async function loadUsers(){
  try {
    const res = await fetch('/api/users');
    const users = await res.json();

    const container = document.getElementById('users-container');
    container.innerHTML = '';

    users.forEach(user => {

      const status = user.is_active == 1 
        ? `<span class="status-active">ACTIVO</span>` 
        : `<span class="status-inactive">PENDIENTE</span>`;

      const div = document.createElement('div');
      div.className = 'card';

      div.innerHTML = `
        <strong>${user.email}</strong> (${user.role})<br>
        Estado: ${status}<br>
        Créditos: $${user.credits || 0}

        <div>
          <button class="blue" onclick="updateCredits(${user.id},5)">+5</button>
          <button class="blue" onclick="updateCredits(${user.id},10)">+10</button>
          <button class="red" onclick="updateCredits(${user.id},-5)">-5</button>
        </div>

        <div>
          <button class="green" onclick="activar('${user.email}')">
            Activar
          </button>

          <button class="red" onclick="eliminar(${user.id})">
            Eliminar
          </button>
        </div>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    console.error(err);
    document.getElementById('users-container').innerHTML = "Error cargando usuarios";
  }
}

// =======================
// ACTIVAR USUARIO
// =======================
async function activar(email){
  try{
    const res = await fetch('/api/admin/activate-plan', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({
        email,
        plan: "1m"
      })
    });

    if(!res.ok) throw new Error();

    loadUsers();

  }catch(err){
    alert("Error activando usuario");
  }
}

// =======================
// ELIMINAR USUARIO
// =======================
async function eliminar(id){

  if(!confirm("¿Eliminar usuario?")) return;

  try{
    const res = await fetch('/api/admin/delete-user', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ userId:id })
    });

    if(!res.ok) throw new Error();

    loadUsers();

  }catch(err){
    alert("Error eliminando usuario");
  }
}

// =======================
// CREDITOS
// =======================
async function updateCredits(userId, amount){
  await fetch(`/api/user/${userId}/credits`,{
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body: JSON.stringify({amount})
  });

  loadUsers();
}

</script>

</body>
</html>
