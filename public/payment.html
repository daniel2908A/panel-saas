<script>

// 🔐 TOKEN
const token = localStorage.getItem("token");

if (!token) {
  alert("Debes iniciar sesión");
  window.location.href = "/login.html";
}

// 💳 COMPRAR PLAN (SIN COMISIÓN)
async function pagar(plan, amount) {

  try {

    const res = await fetch('/api/plan/subscribe', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({
        plan,
        amount // 🔥 SIN comisión
      })
    });

    const data = await res.json();

    if (data.error) {
      alert(data.error);
      return;
    }

    const reference = data.reference;

    // 💡 INFO AL USUARIO
    alert(
      `💳 PLAN SELECCIONADO\n\n` +
      `💰 Total: $${amount}\n\n` +
      `📩 Enviar a Binance\n\n` +
      `📝 MEMO:\n${reference}`
    );

    // 🔥 LINKS BINANCE (EDITA LOS TUYOS)
    let link = "";

    if (plan === "1m") link = "https://pay.binance.com/xxxx1?memo=" + reference;
    if (plan === "3m") link = "https://pay.binance.com/xxxx2?memo=" + reference;
    if (plan === "6m") link = "https://pay.binance.com/xxxx3?memo=" + reference;
    if (plan === "12m") link = "https://pay.binance.com/xxxx4?memo=" + reference;

    window.location.href = link;

  } catch (err) {
    console.error(err);
    alert("Error en el pago");
  }
}

</script>
