<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selecciona tu plan</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #0f172a, #020617);
  font-family: 'Segoe UI', sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: rgba(30, 41, 59, 0.9);
  padding: 40px;
  border-radius: 20px;
  width: 340px;
  text-align: center;
  backdrop-filter: blur(12px);
  box-shadow: 0 0 40px rgba(0,255,150,0.08);
}

h2 {
  margin-bottom: 10px;
  font-weight: 600;
}

.subtitle{
  font-size:13px;
  color:#94a3b8;
  margin-bottom:20px;
}

button {
  display: block;
  width: 100%;
  margin: 12px 0;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.plan {
  background: #0ea5e9;
}

.plan:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #0ea5e9;
}

.best {
  background: #22c55e;
}

.best:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #22c55e;
}

.year {
  background: #f59e0b;
}

.year:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #f59e0b;
}

.badge{
  font-size:11px;
  color:#020617;
  background:#22c55e;
  padding:4px 8px;
  border-radius:6px;
  margin-left:5px;
}

.note{
  font-size:12px;
  color:#94a3b8;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<h2>💳 Activa tu cuenta de vendedor</h2>

<div class="subtitle">
Empieza a vender productos y generar ingresos 💸
</div>

<button class="plan" onclick="goPay('monthly')">
$5 / mes
</button>

<button class="plan" onclick="goPay('3months')">
$10 / 3 meses
</button>

<button class="best" onclick="goPay('6months')">
🔥 $16 / 6 meses <span class="badge">Mejor opción</span>
</button>

<button class="year" onclick="goPay('year')">
🚀 $25 / 1 año
</button>

<div class="note">
⚡ Pago rápido con Binance Pay<br>
🔒 Seguro y sin comisiones ocultas
</div>

</div>

<script>

// =======================
// VALIDAR LOGIN
// =======================
const role = localStorage.getItem("role");

if (role !== "super_reseller") {
  alert("Acceso solo para vendedores");
  window.location.href = "/login.html";
}

// =======================
// REDIRECCIÓN A PAGO
// =======================
function goPay(plan) {

  const email = localStorage.getItem("email");

  if(!email){
    alert("Error: usuario no identificado");
    return;
  }

  // 🔥 guardamos plan (por si lo necesitas después)
  localStorage.setItem("selectedPlan", plan);

  // 👉 ir a pantalla QR (la que ya tienes)
  window.location.href = "/pay.html?plan=" 
    + encodeURIComponent(plan) 
    + "&email=" 
    + encodeURIComponent(email);
}

</script>

</body>
</html>
