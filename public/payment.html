<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selecciona tu plan</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #0f172a, #020617);
  font-family: 'Segoe UI', sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: rgba(30, 41, 59, 0.8);
  padding: 40px;
  border-radius: 20px;
  width: 320px;
  text-align: center;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 40px rgba(0,255,150,0.1);
}

h2 {
  margin-bottom: 25px;
  font-weight: 600;
}

button {
  display: block;
  width: 100%;
  margin: 12px 0;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.plan {
  background: #0ea5e9;
}

.plan:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #0ea5e9;
}

.best {
  background: #22c55e;
}

.best:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #22c55e;
}

.year {
  background: #f59e0b;
}

.year:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #f59e0b;
}
</style>
</head>

<body>

<div class="container">

<h2>💳 Selecciona tu plan</h2>

<button class="plan" onclick="goPay('monthly')">$5 / mes</button>
<button class="plan" onclick="goPay('3months')">$10 / 3 meses</button>
<button class="best" onclick="goPay('6months')">🔥 $16 / 6 meses</button>
<button class="year" onclick="goPay('year')">🚀 $25 / 1 año</button>

</div>

<script>

// =======================
// VALIDAR LOGIN
// =======================
const token = localStorage.getItem("token");

if(!token){
  alert("Debes iniciar sesión primero");
  window.location.href = "/login.html";
}

// =======================
// REDIRECCIÓN A PAGO
// =======================
function goPay(plan) {
  if(!plan){
    alert("Error seleccionando plan");
    return;
  }

  window.location.href = "/pay.html?plan=" + encodeURIComponent(plan);
}

</script>

</body>
</html>
