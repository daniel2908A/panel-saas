<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Selecciona tu plan</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #1e293b;
  padding: 30px;
  border-radius: 15px;
  width: 300px;
  text-align: center;
}

button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  background: #22c55e;
  border: none;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>Selecciona tu plan</h2>

<button onclick="goPay('monthly')">$5 / mes</button>
<button onclick="goPay('3months')">$10 / 3 meses</button>
<button onclick="goPay('6months')">$16 / 6 meses</button>
<button onclick="goPay('year')">$25 / 1 año</button>

</div>

<script>
function goPay(plan) {
  window.location.href = "/pay.html?plan=" + plan;
}
</script>

</body>
</html>
