<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Reseller Panel</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
  margin: 0;
}

h1 {
  color: #38bdf8;
}

.card {
  background: #020617;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 10px;
}

button {
  padding: 10px;
  background: #38bdf8;
  border: none;
  cursor: pointer;
  border-radius: 6px;
}

.product {
  background: #1e293b;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
}
</style>

</head>
<body>

<h1>🚀 Panel Super Reseller</h1>

<div class="card">
  <h3>💰 Mi saldo</h3>
  <p id="balance">Cargando...</p>
</div>

<div class="card">
  <h3>🛒 Productos</h3>
  <div id="products">Cargando...</div>
</div>

<script>

const token = localStorage.getItem('token');

// =======================
// PROTECCIÓN
// =======================
if (!token || token.length < 20) {
  localStorage.removeItem("token");
  window.location.href = "/login.html";
}

// =======================
// CARGAR SALDO
// =======================
async function loadBalance() {
  try{
    const res = await fetch('/api/user/me', {
      headers: { Authorization: 'Bearer ' + token }
    });

    if(!res.ok) throw new Error("Error usuario");

    const data = await res.json();

    document.getElementById("balance").innerText = "$" + (data.credits || 0);

  }catch(err){
    console.error(err);
    document.getElementById("balance").innerText = "❌ Error";
  }
}

// =======================
// CARGAR PRODUCTOS
// =======================
async function loadProducts() {
  try{
    const res = await fetch('/api/products/public');

    if(!res.ok) throw new Error("Error productos");

    const products = await res.json();

    let html = "";

    products.forEach(p => {
      const price = p.price || (p.plans && p.plans[0]?.price) || 0;

      html += `
        <div class="product">
          <b>${p.name}</b><br>
          Precio: $${price}<br><br>
          <button onclick="buyProduct(${p.id}, ${price})">
            Comprar
          </button>
        </div>
      `;
    });

    document.getElementById('products').innerHTML = html;

  }catch(err){
    console.error(err);
    document.getElementById("products").innerHTML = "❌ Error cargando productos";
  }
}

// =======================
// COMPRAR
// =======================
async function buyProduct(productId, price) {
  try{
    const confirmBuy = confirm("¿Comprar producto por $" + price + "?");
    if (!confirmBuy) return;

    const res = await fetch('/api/orders', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Authorization: 'Bearer ' + token
      },
      body: JSON.stringify({ productId })
    });

    if(!res.ok) throw new Error("Error compra");

    const data = await res.json();

    alert(data.message || data.error || "Compra realizada");

    loadBalance();

  }catch(err){
    console.error(err);
    alert("Error procesando compra");
  }
}

// =======================
// INIT
// =======================
loadBalance();
loadProducts();

</script>

</body>
</html>
