<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora</title>

<style>
body{
  font-family: Segoe UI;
  background: linear-gradient(135deg,#020617,#0f172a);
  color: white;
  display: flex;
  margin: 0;
}

.sidebar{
  width: 220px;
  padding: 20px;
}

.sidebar button{
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  background: #111827;
  border: none;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  transition:0.3s;
}

.sidebar button:hover{
  background:#1f2937;
}

.content{
  flex: 1;
  padding: 20px;
}

.grid{
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
  gap: 20px;
}

.card{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

.waiting{
  text-align:center;
  margin-top:100px;
}

.top-box{
  display:flex;
  gap:20px;
  margin-bottom:20px;
}

.big-card{
  flex:1;
  background:#111827;
  padding:20px;
  border-radius:14px;
}

.btn{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
}

.btn-green{
  background:#22c55e;
}

.btn-blue{
  background:#3b82f6;
}
</style>
</head>

<body>

<div class="sidebar">
  <button onclick="dashboard()">Dashboard</button>
  <button onclick="market()">Marketplace</button>
</div>

<div class="content">
  <div id="app">Cargando...</div>
</div>

<script>

const token = localStorage.getItem("token");

if(!token){
  location.href = "/login.html";
}

// =======================
// VALIDAR STATUS
// =======================
async function checkStatus(){
  try{
    const res = await fetch('/api/users/me',{
      headers:{ Authorization: "Bearer " + token }
    });

    const user = await res.json();

    if(user.status !== "active"){
      document.getElementById("app").innerHTML = `
        <div class="waiting">
          <h2>⏳ Esperando confirmación de pago</h2>
          <p>Tu cuenta está en revisión</p>
          <p>Contacta para acelerar:</p>
          <h3 style="color:#22c55e">+56 9 4618 4516</h3>
        </div>
      `;
      return false;
    }

    return user;

  }catch(err){
    console.error(err);
    return false;
  }
}

// =======================
// DASHBOARD
// =======================
async function dashboard(){

  const user = await checkStatus();
  if(!user) return;

  try{
    const res = await fetch('/api/dashboard',{
      headers:{ Authorization: "Bearer " + token }
    });

    const data = await res.json();

    const referralLink = `${window.location.origin}/register.html?ref=${user.referral_code || ''}`;

    document.getElementById("app").innerHTML = `
      
      <div class="top-box">
        <div class="big-card">
          <h3>💳 Créditos</h3>
          <h2>$${data.credits}</h2>
          <button class="btn btn-green">Recargar</button>
        </div>

        <div class="big-card">
          <h3>📅 Plan</h3>
          <p>Activo</p>
          <p>Días restantes: (pendiente)</p>
        </div>

        <div class="big-card">
          <h3>💰 Ganancias</h3>
          <p>Ventas: $${user.earnings_sales || 0}</p>
          <p>Referidos: $${user.earnings_referrals || 0}</p>
        </div>
      </div>

      <div class="card">
        <h3>👥 Sistema de Referidos</h3>

        <p><b>Código:</b> ${user.referral_code || '---'}</p>

        <p><b>Link:</b></p>
        <input value="${referralLink}" readonly style="width:100%;padding:8px;border-radius:6px;border:none">

        <button class="btn btn-blue" onclick="copyRef('${referralLink}')">
          Copiar link
        </button>
      </div>

      <div class="grid">
        <div class="card">💰 Ventas: ${data.sales}</div>
        <div class="card">👤 Usuarios: ${data.users}</div>
        <div class="card">📦 Productos activos</div>
      </div>
    `;
  }catch(err){
    console.error(err);
  }
}

// =======================
// COPIAR LINK
// =======================
function copyRef(link){
  navigator.clipboard.writeText(link);
  alert("Link copiado 🔥");
}

// =======================
// MARKETPLACE (NO TOCADO)
// =======================
async function market(){

  const ok = await checkStatus();
  if(!ok) return;

  try{
    const res = await fetch('/api/products',{
      headers:{ Authorization: "Bearer " + token }
    });

    const products = await res.json();

    document.getElementById("app").innerHTML = `
      <h2>🛒 Marketplace</h2>

      <div class="card">
        <h3>Crear Producto</h3>

        <input id="name" placeholder="Nombre">
        <input id="price" placeholder="Precio">
        <input type="file" id="file">
        <textarea id="desc" placeholder="Descripción"></textarea>

        <button class="btn btn-blue" onclick="create()">Crear</button>
      </div>

      <div class="grid">
        ${products.map(p => `
          <div class="card">
            <h3>${p.name}</h3>
            <p>${p.description || ""}</p>
            <b>$${p.price}</b>

            <button class="btn btn-blue">Editar</button>
            <button class="btn" style="background:#ef4444">Eliminar</button>
          </div>
        `).join("")}
      </div>
    `;
  }catch(err){
    console.error(err);
  }
}

// =======================
// CREAR PRODUCTO
// =======================
async function create(){

  const ok = await checkStatus();
  if(!ok) return;

  try{
    const form = new FormData();

    form.append("name", document.getElementById("name").value);
    form.append("price", document.getElementById("price").value);
    form.append("description", document.getElementById("desc").value);

    const file = document.getElementById("file").files[0];
    if(file) form.append("image", file);

    await fetch('/api/products',{
      method:'POST',
      headers:{ Authorization: "Bearer " + token },
      body: form
    });

    alert("Producto creado");
    market();

  }catch(err){
    console.error(err);
  }
}

// INIT
dashboard();

</script>

</body>
</html>
