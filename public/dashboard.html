<!-- SOLO TE MUESTRO LA PARTE MODIFICADA (loadStats COMPLETO) -->

<script>

async function loadStats() {

  let data = { sales: 0, users: 0 };
  let user = { credits: 0 };

  try {
    const res = await fetch('/api/dashboard', {
      headers: { Authorization: 'Bearer ' + token }
    });
    if (res.ok) data = await res.json();
  } catch {}

  try {
    const userRes = await fetch('/api/user/me', {
      headers: { Authorization: 'Bearer ' + token }
    });
    if (userRes.ok) user = await userRes.json();
  } catch {}

  // 🔥 CALCULAMOS DÍAS
  let diasRestantes = 0;
  if (user.expires_at) {
    diasRestantes = Math.max(
      0,
      Math.floor((new Date(user.expires_at) - new Date()) / (1000*60*60*24))
    );
  }

  document.getElementById('data').innerHTML = `
    <div class="cards">

      <div class="card">
        <h3>💰 Ventas</h3>
        <p>$${data.sales || 0}</p>
      </div>

      <div class="card">
        <h3>👥 Usuarios</h3>
        <p>${data.users || 0}</p>
      </div>

      <div class="card">
        <h3>💸 Créditos</h3>
        <p>$${user.credits || 0}</p>
      </div>

      <div class="card">
        <h3>💳 Suscripción</h3>

        <p style="font-size:18px; font-weight:bold;">
          ${user.plan ? user.plan.toUpperCase() : "SIN PLAN"}
        </p>

        <p>
          ${
            user.expires_at
            ? new Date(user.expires_at).toLocaleDateString()
            : "No definido"
          }
        </p>

        <p style="
          font-weight:bold;
          margin-top:10px;
          color:${user.plan ? "#22c55e" : "#ef4444"};
        ">
          ${user.plan ? "🟢 Activo" : "🔴 Sin plan"}
        </p>

        ${
          user.expires_at
          ? `<p style="color:#38bdf8;">
              ⏳ ${diasRestantes} días restantes
            </p>`
          : ""
        }

      </div>

    </div>
  `;
}

</script>
