<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  display: flex;
}

.sidebar {
  width: 240px;
  background: rgba(2, 6, 23, 0.9);
  padding: 20px;
}

.sidebar h2 {
  color: #38bdf8;
}

.sidebar button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  border: none;
  color: white;
  cursor: pointer;
}

.content {
  flex: 1;
  padding: 30px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.03);
  border-radius: 16px;
  padding: 20px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>NEXORA</h2>

  <button onclick="loadStats()">📊 Estadísticas</button>
  <button onclick="loadProducts()">🛒 Marketplace</button>
  <button onclick="logout()">🚪 Salir</button>
</div>

<div class="content">
  <h1 id="title"></h1>
  <div id="data"></div>
</div>

<script>

const token = localStorage.getItem('token');
const role = localStorage.getItem('role');

if (!token) location.href = "/login.html";

document.getElementById("title").innerText = "Dashboard Super Reseller";


// ===================== STATS =====================
async function loadStats() {

  let data = { sales: 0, users: 0 };
  let user = { credits: 0 };

  try {
    const res = await fetch('/api/dashboard', {
      headers: { Authorization: 'Bearer ' + token }
    });
    if (res.ok) data = await res.json();
  } catch {}

  try {
    const userRes = await fetch('/api/user/me', {
      headers: { Authorization: 'Bearer ' + token }
    });
    if (userRes.ok) user = await userRes.json();
  } catch {}

  let dias = 0;
  if (user.expires_at) {
    dias = Math.floor((new Date(user.expires_at) - new Date()) / (1000*60*60*24));
  }

  document.getElementById('data').innerHTML = `
    <div class="cards">

      <div class="card">
        <h3>💰 Ventas</h3>
        <p>$${data.sales || 0}</p>
      </div>

      <div class="card">
        <h3>👥 Usuarios</h3>
        <p>${data.users || 0}</p>
      </div>

      <div class="card">
        <h3>💸 Créditos</h3>
        <p>$${user.credits || 0}</p>
      </div>

      <div class="card">
        <h3>💳 Suscripción</h3>

        <p><b>${user.plan ? user.plan.toUpperCase() : "SIN PLAN"}</b></p>

        <p>
          ${user.expires_at 
            ? new Date(user.expires_at).toLocaleDateString() 
            : "No definido"}
        </p>

        <p style="color:${user.plan ? "green" : "red"};">
          ${user.plan ? "🟢 Activo" : "🔴 Sin plan"}
        </p>

        ${
          user.expires_at 
          ? `<p>⏳ ${dias} días restantes</p>` 
          : ""
        }

      </div>

    </div>
  `;
}


// =====================
function loadProducts() {
  alert("Marketplace listo");
}

function logout() {
  localStorage.clear();
  location.href = "/";
}

loadStats();

</script>

</body>
</html>
