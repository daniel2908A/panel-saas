<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nexora Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#020617;
  padding:20px;
}
.sidebar h2{color:#38bdf8;}

.sidebar button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#111827;
  color:white;
  cursor:pointer;
}
.sidebar button:hover{
  background:linear-gradient(90deg,#38bdf8,#6366f1);
}

/* CONTENT */
.content{
  flex:1;
  padding:30px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:#111827;
  padding:15px;
  border-radius:15px;
}

/* BOTONES */
.btn{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.green{background:#22c55e;color:white;}
.blue{background:#3b82f6;color:white;}
.red{background:#ef4444;color:white;}

/* FORM */
input, textarea{
  width:100%;
  margin-top:8px;
  padding:10px;
  border-radius:8px;
  border:none;
}

.upload{
  border:2px dashed #38bdf8;
  padding:20px;
  text-align:center;
  margin-top:10px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>NEXORA</h2>
  <button onclick="loadDashboard()">📊 Dashboard</button>
  <button onclick="loadMarketplace()">🛒 Marketplace</button>
  <button onclick="logout()">🚪 Salir</button>
</div>

<div class="content">
  <h1 id="title"></h1>
  <div id="app"></div>
</div>

<script>

const token = localStorage.getItem('token');

// ================= DASHBOARD =================
async function loadDashboard(){
  document.getElementById("title").innerText="Dashboard";

  let data;

  try{
    const res = await fetch('/api/dashboard',{
      headers:{Authorization:"Bearer "+token}
    });

    if(!res.ok) throw 0;
    data = await res.json();

  }catch{
    data = {
      sales:0,
      users:0,
      credits:100,
      plan:"Sin plan",
      expire:"2026-05-12"
    };
  }

  let exp = new Date(data.expire);
  let days = Math.ceil((exp - new Date())/(1000*60*60*24));

  document.getElementById("app").innerHTML=`
    <div class="grid">
      <div class="card">💰 Ventas<br><h2>$${data.sales}</h2></div>
      <div class="card">👤 Usuarios<br><h2>${data.users}</h2></div>
      <div class="card">💳 Créditos<br><h2>$${data.credits}</h2></div>
      <div class="card">
        📅 Suscripción<br><br>
        ${data.plan}<br>
        ${exp.toLocaleDateString()}<br><br>
        ${days>0 ? "🟢 Activo" : "🔴 Expirado"}<br>
        ${days>0 ? days+" días restantes" : "Vencido"}
      </div>
    </div>
  `;
}

// ================= MARKETPLACE =================
async function loadMarketplace(){

  document.getElementById("title").innerText="Marketplace";

  let products=[];

  try{
    const res = await fetch('/api/products',{
      headers:{Authorization:"Bearer "+token}
    });

    if(res.ok) products = await res.json();

  }catch{}

  document.getElementById("app").innerHTML=`

    <button class="btn blue" onclick="loadDashboard()">← Volver</button>

    <div class="card" style="margin-top:20px">
      <h3>➕ Crear Producto</h3>

      <input id="name" placeholder="Nombre">
      <input id="price" placeholder="Precio">

      <div class="upload" onclick="file.click()">
        📂 Subir imagen
      </div>
      <input type="file" id="file" hidden>

      <textarea id="desc" placeholder="Descripción"></textarea>

      <button class="btn green" onclick="createProduct()">Crear</button>
    </div>

    <div class="grid" style="margin-top:20px">
      ${products.map(p=>`
        <div class="card">
          <h3>${p.name}</h3>
          <p>${p.description || ""}</p>
          <b>$${p.price}</b><br><br>

          <button class="btn blue" onclick="editProduct(${p.id})">✏️</button>
          <button class="btn red" onclick="deleteProduct(${p.id})">🗑️</button>
        </div>
      `).join("")}
    </div>
  `;
}

// ================= CREATE =================
async function createProduct(){

  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const desc = document.getElementById("desc").value;

  try{
    await fetch('/api/products',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        Authorization:"Bearer "+token
      },
      body:JSON.stringify({name,price,description:desc})
    });

    loadMarketplace();

  }catch{
    alert("Error creando producto");
  }
}

// ================= DELETE =================
async function deleteProduct(id){

  if(!confirm("Eliminar producto?")) return;

  await fetch('/api/products/'+id,{
    method:'DELETE',
    headers:{Authorization:"Bearer "+token}
  });

  loadMarketplace();
}

// ================= EDIT =================
async function editProduct(id){

  const name = prompt("Nuevo nombre:");
  const price = prompt("Nuevo precio:");

  if(!name || !price) return;

  await fetch('/api/products/'+id,{
    method:'PUT',
    headers:{
      'Content-Type':'application/json',
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({name,price})
  });

  loadMarketplace();
}

// ================= LOGOUT =================
function logout(){
  localStorage.clear();
  location.href="/";
}

loadDashboard();

</script>

</body>
</html>
