<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora</title>

<style>
body{
  font-family: Segoe UI;
  background: #020617;
  color: white;
  display: flex;
  margin: 0;
}

.sidebar{
  width: 220px;
  padding: 20px;
}

.sidebar button{
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  background: #111827;
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.content{
  flex: 1;
  padding: 20px;
}

.grid{
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(200px,1fr));
  gap: 20px;
}

.card{
  background: #111827;
  padding: 15px;
  border-radius: 10px;
}

.waiting{
  text-align:center;
  margin-top:100px;
}
</style>
</head>

<body>

<div class="sidebar">
  <button onclick="dashboard()">Dashboard</button>
  <button onclick="market()">Marketplace</button>
</div>

<div class="content">
  <div id="app">Cargando...</div>
</div>

<script>

const token = localStorage.getItem("token");

if(!token){
  location.href = "/login.html";
}

// =======================
// 🔥 VALIDAR STATUS
// =======================
async function checkStatus(){
  try{
    const res = await fetch('/api/users/me',{
      headers:{ Authorization: "Bearer " + localStorage.getItem("token") }
    });

    const user = await res.json();

    if(user.status !== "active"){
      document.getElementById("app").innerHTML = `
        <div class="waiting">
          <h2>⏳ Esperando confirmación de pago</h2>
          <p>Tu cuenta está en revisión</p>
          <p>Contacta para acelerar:</p>
          <h3 style="color:#22c55e">+56 9 4618 4516</h3>
        </div>
      `;
      return false;
    }

    return true;

  }catch(err){
    console.error(err);
    return false;
  }
}

// =======================
// DASHBOARD
// =======================
async function dashboard(){

  const ok = await checkStatus();
  if(!ok) return;

  try{
    const res = await fetch('/api/dashboard',{
      headers:{ Authorization: "Bearer " + token }
    });

    const data = await res.json();

    document.getElementById("app").innerHTML = `
      <div class="grid">
        <div class="card">💰 Ventas: ${data.sales}</div>
        <div class="card">👤 Usuarios: ${data.users}</div>
        <div class="card">💳 Créditos: $${data.credits}</div>
      </div>
    `;
  }catch(err){
    console.error(err);
  }
}

// =======================
// MARKETPLACE
// =======================
async function market(){

  const ok = await checkStatus();
  if(!ok) return;

  try{
    const res = await fetch('/api/products',{
      headers:{ Authorization: "Bearer " + token }
    });

    const products = await res.json();

    document.getElementById("app").innerHTML = `
      <h3>Crear Producto</h3>

      <input id="name" placeholder="Nombre">
      <input id="price" placeholder="Precio">
      <input type="file" id="file">
      <textarea id="desc" placeholder="Descripción"></textarea>

      <button onclick="create()">Crear</button>

      <hr>

      <div class="grid">
        ${products.map(p => `
          <div class="card">
            <h3>${p.name}</h3>
            <p>${p.description || ""}</p>
            <b>$${p.price}</b>
          </div>
        `).join("")}
      </div>
    `;
  }catch(err){
    console.error(err);
  }
}

// =======================
// CREAR PRODUCTO
// =======================
async function create(){

  const ok = await checkStatus();
  if(!ok) return;

  try{
    const form = new FormData();

    form.append("name", document.getElementById("name").value);
    form.append("price", document.getElementById("price").value);
    form.append("description", document.getElementById("desc").value);

    const file = document.getElementById("file").files[0];
    if(file) form.append("image", file);

    await fetch('/api/products',{
      method:'POST',
      headers:{ Authorization: "Bearer " + token },
      body: form
    });

    alert("Producto creado");
    market();

  }catch(err){
    console.error(err);
  }
}

// INIT
dashboard();

</script>

</body>
</html>
