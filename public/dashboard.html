<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora</title>

<style>
body{
  font-family: Segoe UI;
  background: linear-gradient(135deg,#020617,#0f172a);
  color: white;
  display: flex;
  margin: 0;
}

.sidebar{
  width: 220px;
  padding: 20px;
}

.sidebar button{
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  background: #111827;
  border: none;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

.content{
  flex: 1;
  padding: 20px;
}

.grid{
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
  gap: 20px;
}

.card{
  background: linear-gradient(145deg,#0f172a,#020617);
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
}

.btn{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:5px;
}

.btn-blue{ background:#3b82f6 }
.btn-green{ background:#22c55e }

.color-btn{
  width:30px;
  height:30px;
  border-radius:50%;
  border:2px solid white;
  cursor:pointer;
  transition:0.2s;
}

.selected-color{
  border:3px solid white !important;
  transform: scale(1.1);
}

.big-card{
  flex:1;
  background:#111827;
  padding:20px;
  border-radius:14px;
}

.top-box{
  display:flex;
  gap:20px;
  margin-bottom:20px;
}
</style>
</head>

<body>

<div class="sidebar">
  <button onclick="dashboard()">Dashboard</button>
  <button onclick="market()">Marketplace</button>
</div>

<div class="content">
  <div id="app">Cargando...</div>
</div>

<script>

const token = localStorage.getItem("token");
if(!token) location.href="/login.html";

let selectedColor = "#3b82f6";

function setColor(color, el){
  selectedColor = color;

  document.querySelectorAll('.color-btn').forEach(btn=>{
    btn.classList.remove('selected-color');
  });

  el.classList.add('selected-color');
}

async function checkStatus(){
  const res = await fetch('/api/users/me',{
    headers:{ Authorization:"Bearer "+token }
  });
  const user = await res.json();

  if(user.status!=="active"){
    document.getElementById("app").innerHTML=`
      <div style="text-align:center;margin-top:100px">
        <h2>⏳ Esperando confirmación</h2>
        <p>Tu cuenta está en revisión</p>
      </div>
    `;
    return false;
  }
  return user;
}

function getDaysLeft(date){
  if(!date) return "Sin plan";
  const diff=Math.ceil((new Date(date)-new Date())/(1000*60*60*24));
  return diff>0?diff+" días":"Expirado";
}

async function dashboard(){
  const user=await checkStatus();
  if(!user)return;

  const res=await fetch('/api/dashboard',{
    headers:{ Authorization:"Bearer "+token }
  });
  const data=await res.json();

  document.getElementById("app").innerHTML=`
  <div class="top-box">

    <div class="big-card">
      <h3>💳 Créditos</h3>
      <h2>$${data.credits}</h2>
      <button class="btn btn-green">Recargar</button>
    </div>

    <div class="big-card">
      <h3>📅 Plan</h3>
      <p>Días restantes: ${getDaysLeft(user.plan_expiration)}</p>
    </div>

    <div class="big-card">
      <h3>💰 Ganancias</h3>
      <p>Ventas: $${user.earnings_sales||0}</p>
      <p>Referidos: $${user.earnings_referrals||0}</p>
    </div>

  </div>
  `;
}

function preset(type){
  const presets={
    Netflix:{name:"Cuenta Netflix Premium",desc:"Acceso completo UHD",price:"5",color:"#e50914"},
    Disney:{name:"Cuenta Disney+",desc:"Películas y series",price:"4",color:"#2563eb"},
    Spotify:{name:"Spotify Premium",desc:"Sin anuncios",price:"3",color:"#1db954"}
  };

  const p=presets[type];
  document.getElementById("name").value=p.name;
  document.getElementById("desc").value=p.desc;
  document.getElementById("price").value=p.price;
  selectedColor=p.color;
}

async function market(){

  const ok=await checkStatus();
  if(!ok)return;

  const res=await fetch('/api/products',{
    headers:{ Authorization:"Bearer "+token }
  });

  const products=await res.json();

  document.getElementById("app").innerHTML=`

  <h2>🛒 Marketplace</h2>

  <div class="card">

    <h3>⚡ Productos rápidos</h3>
    <button class="btn btn-blue" onclick="preset('Netflix')">Netflix</button>
    <button class="btn btn-blue" onclick="preset('Disney')">Disney+</button>
    <button class="btn btn-blue" onclick="preset('Spotify')">Spotify</button>

    <h3>Crear Producto</h3>

    <input id="name" placeholder="Nombre">
    <input id="price" placeholder="Precio">

    <h4>Color:</h4>
    <div style="display:flex;gap:10px;margin-bottom:10px;">
      <div class="color-btn" style="background:#3b82f6" onclick="setColor('#3b82f6', this)"></div>
      <div class="color-btn" style="background:#ef4444" onclick="setColor('#ef4444', this)"></div>
      <div class="color-btn" style="background:#22c55e" onclick="setColor('#22c55e', this)"></div>
      <div class="color-btn" style="background:#eab308" onclick="setColor('#eab308', this)"></div>
      <div class="color-btn" style="background:#ec4899" onclick="setColor('#ec4899', this)"></div>
      <div class="color-btn" style="background:#000" onclick="setColor('#000', this)"></div>
    </div>

    <textarea id="desc" placeholder="Descripción"></textarea>

    <button class="btn btn-blue" onclick="create()">Crear</button>

  </div>

  <div class="grid">

    ${products.map(p=>`
      <div class="card">

        <div style="
          height:120px;
          display:flex;
          align-items:center;
          justify-content:center;
          border-radius:12px;
          font-size:20px;
          font-weight:bold;
          background: linear-gradient(135deg, ${p.color||'#3b82f6'}, #000);
          box-shadow: 0 0 20px ${p.color||'#3b82f6'};
        ">
          ${p.name || 'Producto'}
        </div>

        <p>${p.description||""}</p>
        <h2>$${p.price||0}</h2>

        <button class="btn btn-green" onclick="editProduct(${p.id})">Editar</button>
        <button class="btn btn-blue" onclick="deleteProduct(${p.id})">Eliminar</button>

      </div>
    `).join("")}

  </div>
  `;

  setTimeout(()=>{
    const first = document.querySelector('.color-btn');
    if(first) first.click();
  },100);
}

async function create(){

  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const description = document.getElementById("desc").value;

  if(!name || !price){
    alert("Completa los campos");
    return;
  }

  await fetch('/api/products',{
    method:'POST',
    headers:{ 
      "Content-Type":"application/json",
      Authorization:"Bearer "+token 
    },
    body: JSON.stringify({
      name,
      price,
      description,
      color:selectedColor
    })
  });

  alert("Producto creado");
  market();
}

function editProduct(id){
  const name = prompt("Nuevo nombre:");
  const price = prompt("Nuevo precio:");

  if(!name || !price) return;

  fetch('/api/products/'+id,{
    method:'PUT',
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body: JSON.stringify({ name, price })
  }).then(()=>market());
}

async function deleteProduct(id){
  await fetch('/api/products/'+id,{
    method:'DELETE',
    headers:{ Authorization:"Bearer "+token }
  });
  market();
}

dashboard();

</script>

</body>
</html>
