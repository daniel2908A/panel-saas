<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  display: flex;
}

.sidebar {
  width: 240px;
  background: rgba(2, 6, 23, 0.9);
  padding: 20px;
}

.sidebar h2 { color: #38bdf8; }

.sidebar button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  border: none;
  color: white;
  cursor: pointer;
}

.sidebar button:hover {
  background: linear-gradient(90deg, #38bdf8, #6366f1);
}

.content { flex: 1; padding: 30px; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}

.card {
  background: rgba(255,255,255,0.03);
  border-radius: 16px;
  padding: 20px;
}

.back-btn {
  margin-bottom: 20px;
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg,#38bdf8,#6366f1);
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>NEXORA</h2>
  <button onclick="loadStats()">📊 Estadísticas</button>
  <button onclick="loadProducts()">🛒 Marketplace</button>
  <button onclick="logout()">🚪 Salir</button>
</div>

<div class="content">
  <h1 id="title"></h1>
  <div id="data"></div>
</div>

<script>

const token = localStorage.getItem('token');
if (!token) location.href = "/login.html";


// ================= DASHBOARD =================
async function loadStats(){

  document.getElementById("title").innerText = "Dashboard";

  try{

    const res = await fetch('/api/dashboard',{
      headers:{Authorization:"Bearer "+token}
    });

    const data = await res.json().catch(()=>null);

    if(!res.ok || !data){
      throw new Error("Dashboard API error");
    }

    // ===== LOG PARA DEBUG =====
    console.log("Dashboard data:", data);

    let expireText = "Sin fecha";
    let daysLeft = 0;
    let color = "red";
    let status = "Sin plan";

    if(data.expire){
      const exp = new Date(data.expire);
      const now = new Date();

      daysLeft = Math.ceil((exp - now)/(1000*60*60*24));
      expireText = exp.toLocaleDateString();

      if(daysLeft > 0){
        color = "#22c55e";
        status = "Activo";
      } else {
        status = "Expirado";
      }
    }

    document.getElementById('data').innerHTML = `
      <div class="grid">
        <div class="card">💰 Ventas <h2>$${data.sales||0}</h2></div>
        <div class="card">👤 Usuarios <h2>${data.users||0}</h2></div>
        <div class="card">💳 Créditos <h2>$${data.credits||0}</h2></div>

        <div class="card">
          📅 Suscripción<br><br>
          <b>${data.plan||"SIN PLAN"}</b><br>
          ${expireText}<br><br>

          <span style="
            width:10px;height:10px;
            display:inline-block;
            border-radius:50%;
            background:${color};
          "></span>

          <b style="color:${color}">${status}</b><br><br>

          ${daysLeft>0 ? daysLeft+" días restantes" : "Vencido"}
        </div>
      </div>
    `;

  }catch(err){

    console.error("ERROR DASHBOARD:", err);

    document.getElementById('data').innerHTML = `
      <div class="card">
        ❌ Error cargando dashboard<br><br>
        Revisa backend /api/dashboard
      </div>
    `;
  }
}


// ================= PRODUCTS =================
async function loadProducts(){

  document.getElementById("title").innerText = "Marketplace";

  try{

    const res = await fetch('/api/products',{
      headers:{Authorization:"Bearer "+token}
    });

    const products = await res.json().catch(()=>[]);

    if(!res.ok){
      throw new Error("Products API error");
    }

    document.getElementById('data').innerHTML = `
      <button class="back-btn" onclick="loadStats()">← Volver</button>

      <div class="grid">
        ${products.map(p=>`
          <div class="card">
            <h3>${p.name}</h3>
            <p>${p.description||""}</p>
            <b>$${p.price}</b>
          </div>
        `).join("")}
      </div>
    `;

  }catch(err){

    console.error("ERROR PRODUCTS:", err);

    document.getElementById('data').innerHTML = `
      <div class="card">
        ❌ Error cargando productos<br><br>
        Revisa backend /api/products
      </div>
    `;
  }
}


// ================= LOGOUT =================
function logout(){
  localStorage.clear();
  location.href="/";
}

loadStats();

</script>

</body>
</html>
