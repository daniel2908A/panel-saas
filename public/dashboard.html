<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
    }

    .sidebar {
      width: 220px;
      background: #020617;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      color: #38bdf8;
    }

    .sidebar button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: transparent;
      border: 1px solid #38bdf8;
      color: #38bdf8;
      cursor: pointer;
      border-radius: 8px;
    }

    .content {
      flex: 1;
      padding: 20px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: #020617;
      padding: 20px;
      border-radius: 10px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      margin-top: 10px;
      background: #22c55e;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>NEXORA</h2>

  <button onclick="loadStats()">📊 Estadísticas</button>
  <button onclick="loadUsers()">👥 Usuarios</button>
  <button onclick="loadProducts()">🛒 Marketplace</button>
  <button onclick="logout()">🚪 Salir</button>
</div>

<div class="content">
  <h1 id="title">Dashboard</h1>
  <div id="data"></div>
</div>

<script>

const token = localStorage.getItem('token');
const role = localStorage.getItem('role');

if (!token || !role) {
  window.location.href = "/login.html";
}

const title = document.getElementById("title");

title.innerText =
  role === "admin" ? "Dashboard Admin" :
  role === "super_reseller" ? "Dashboard Super Reseller" :
  "Dashboard Usuario";


// ===================== STATS =====================
async function loadStats() {
  try {

    const res = await fetch('/api/dashboard', {
      headers: { Authorization: 'Bearer ' + token }
    });

    if (!res.ok) throw new Error("Error stats");

    const data = await res.json();

    const userRes = await fetch('/api/user/me', {
      headers: { Authorization: 'Bearer ' + token }
    });

    const user = await userRes.json();

    document.getElementById('data').innerHTML = `
      <div class="cards">
        <div class="card">
          <h3>💰 Ventas</h3>
          <p>$${data.sales || 0}</p>
        </div>

        <div class="card">
          <h3>👥 Usuarios</h3>
          <p>${data.users || 0}</p>
        </div>

        <div class="card">
          <h3>💸 Créditos</h3>
          <p>$${user.credits || 0}</p>
        </div>

        <div class="card">
          <h3>💳 Suscripción</h3>
          <p>${user.plan || "Sin plan"}</p>
          <p>${user.expires_at || "No definido"}</p>
        </div>
      </div>
    `;

  } catch (err) {
    alert("Error cargando dashboard");
    console.error(err);
  }
}


// ===================== MARKETPLACE =====================
async function loadProducts() {

  try {

    const res = await fetch('/api/products', {
      headers: { Authorization: 'Bearer ' + token }
    });

    if (!res.ok) throw new Error("Error cargando productos");

    const products = await res.json();

    let html = `
      <h2>🛒 Marketplace</h2>

      <div class="card">
        <h3>➕ Crear Producto</h3>

        <input id="pName" placeholder="Nombre">
        <input id="pPrice" placeholder="Precio">
        <input id="pImage" placeholder="URL Imagen">
        <textarea id="pDesc" placeholder="Descripción"></textarea>

        <button onclick="crearProducto()">Crear Producto</button>
      </div>

      <div class="cards">
    `;

    products.forEach(p => {
      html += `
        <div class="card">
          ${p.image ? `<img src="${p.image}">` : ''}
          <h3>${p.name}</h3>
          <p>${p.description || 'Sin descripción'}</p>
          <p>💲 $${p.price}</p>
          <p>👤 ${p.username || 'Vendedor'}</p>
        </div>
      `;
    });

    html += '</div>';

    document.getElementById('data').innerHTML = html;

  } catch (err) {
    alert("Error cargando productos");
    console.error(err);
  }
}


// ===================== CREAR PRODUCTO =====================
async function crearProducto() {

  const name = document.getElementById('pName').value;
  const price = document.getElementById('pPrice').value;
  const image = document.getElementById('pImage').value;
  const description = document.getElementById('pDesc').value;

  if (!name || !price) {
    alert("Nombre y precio obligatorios");
    return;
  }

  try {

    const res = await fetch('/api/products', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Authorization: 'Bearer ' + token
      },
      body: JSON.stringify({ name, price, image, description })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.error || "Error al crear producto");
      console.error("ERROR BACK:", data);
      return;
    }

    alert("✅ Producto creado");
    loadProducts();

  } catch (err) {
    alert("Error conexión servidor");
    console.error(err);
  }
}


// ===================== USERS =====================
async function loadUsers() {

  try {

    const res = await fetch('/api/admin/users', {
      headers: { Authorization: 'Bearer ' + token }
    });

    const users = await res.json();

    let html = '<h2>Usuarios</h2>';

    users.forEach(u => {
      html += `
        <div class="card">
          <b>${u.username}</b><br>
          💰 Créditos: ${u.credits}
        </div>
      `;
    });

    document.getElementById('data').innerHTML = html;

  } catch (err) {
    alert("Error cargando usuarios");
    console.error(err);
  }
}


// ===================== LOGOUT =====================
function logout() {
  localStorage.clear();
  window.location.href = '/';
}


// INIT
loadStats();

</script>

</body>
</html>
