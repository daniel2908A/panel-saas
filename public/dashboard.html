<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
    }

    .sidebar {
      width: 220px;
      background: #020617;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      color: #38bdf8;
    }

    .sidebar button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: transparent;
      border: 1px solid #38bdf8;
      color: #38bdf8;
      cursor: pointer;
      border-radius: 8px;
    }

    .content {
      flex: 1;
      padding: 20px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: #020617;
      padding: 20px;
      border-radius: 10px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      margin-top: 10px;
      background: #22c55e;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
    }

    /* 🔥 BOTÓN VOLVER PRO */
    .btn-back {
      padding: 10px 18px;
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      color: white;
      font-weight: bold;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(99,102,241,0.6);
      transition: 0.2s;
    }

    .btn-back:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(99,102,241,0.9);
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    #dropZone {
      margin-top: 10px;
      padding: 20px;
      border: 2px dashed #38bdf8;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }

    #dropZone:hover {
      background: rgba(56,189,248,0.1);
    }

    #preview {
      display: none;
      margin-top: 10px;
    }

  </style>
</head>

<body>

<div class="sidebar">
  <h2>NEXORA</h2>

  <button onclick="loadStats()">📊 Estadísticas</button>
  <button onclick="loadUsers()">👥 Usuarios</button>
  <button onclick="loadProducts()">🛒 Marketplace</button>
  <button onclick="logout()">🚪 Salir</button>
</div>

<div class="content">
  <h1 id="title">Dashboard</h1>
  <div id="data"></div>
</div>

<script>

const token = localStorage.getItem('token');
const role = localStorage.getItem('role');

if (!token || !role) {
  window.location.href = "/login.html";
}

const title = document.getElementById("title");

title.innerText =
  role === "admin" ? "Dashboard Admin" :
  role === "super_reseller" ? "Dashboard Super Reseller" :
  "Dashboard Usuario";


// ===================== STATS =====================
async function loadStats() {

  let data = { sales: 0, users: 0 };
  let user = { credits: 0 };

  try {
    const res = await fetch('/api/dashboard', {
      headers: { Authorization: 'Bearer ' + token }
    });

    if (res.ok) data = await res.json();
  } catch {}

  try {
    const userRes = await fetch('/api/user/me', {
      headers: { Authorization: 'Bearer ' + token }
    });

    if (userRes.ok) user = await userRes.json();
  } catch {}

  document.getElementById('data').innerHTML = `
    <div class="cards">
      <div class="card">
        <h3>💰 Ventas</h3>
        <p>$${data.sales || 0}</p>
      </div>

      <div class="card">
        <h3>👥 Usuarios</h3>
        <p>${data.users || 0}</p>
      </div>

      <div class="card">
        <h3>💸 Créditos</h3>
        <p>$${user.credits || 0}</p>
      </div>

      <div class="card">
        <h3>💳 Suscripción</h3>
        <p>${user.plan || "Sin plan"}</p>
        <p>${user.expires_at || "No definido"}</p>
      </div>
    </div>
  `;
}


// ===================== MARKETPLACE =====================
async function loadProducts() {

  try {

    const res = await fetch('/api/products', {
      headers: { Authorization: 'Bearer ' + token }
    });

    const products = await res.json();

    let html = `
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>🛒 Marketplace</h2>
        <button class="btn-back" onclick="loadStats()">⬅ Volver</button>
      </div>

      <div class="card">
        <h3>➕ Crear Producto</h3>

        <input id="pName" placeholder="Nombre">
        <input id="pPrice" placeholder="Precio">

        <!-- 🔥 DROP ZONE -->
        <div id="dropZone">
          📸 Arrastra imagen aquí o haz click
          <input type="file" id="fileInput" accept="image/*" style="display:none;">
        </div>

        <img id="preview">

        <textarea id="pDesc" placeholder="Descripción"></textarea>

        <button onclick="crearProducto()">Crear Producto</button>
      </div>

      <div class="cards">
    `;

    products.forEach(p => {
      html += `
        <div class="card">
          ${p.image ? `<img src="${p.image}">` : ''}
          <h3>${p.name}</h3>
          <p>${p.description || 'Sin descripción'}</p>
          <p>💲 $${p.price}</p>
          <p>👤 ${p.username || 'Vendedor'}</p>
        </div>
      `;
    });

    html += '</div>';

    document.getElementById('data').innerHTML = html;

    activarDrop();

  } catch (err) {
    alert("Error cargando productos");
  }
}


// ===================== IMAGE =====================
let imageBase64 = "";

function activarDrop() {

  document.getElementById("dropZone").onclick = () => {
    document.getElementById("fileInput").click();
  };

  document.getElementById("fileInput").onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(ev) {
      imageBase64 = ev.target.result;

      const img = document.getElementById("preview");
      img.src = imageBase64;
      img.style.display = "block";
    };

    reader.readAsDataURL(file);
  };
}


// ===================== CREAR PRODUCTO =====================
async function crearProducto() {

  const name = document.getElementById('pName').value;
  const price = document.getElementById('pPrice').value;
  const description = document.getElementById('pDesc').value;

  if (!name || !price) {
    alert("Nombre y precio obligatorios");
    return;
  }

  try {

    const res = await fetch('/api/products', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Authorization: 'Bearer ' + token
      },
      body: JSON.stringify({
        name,
        price,
        image: imageBase64,
        description
      })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.error || "Error al crear producto");
      return;
    }

    alert("✅ Producto creado");

    loadStats();

  } catch (err) {
    alert("Error conexión servidor");
  }
}


// ===================== USERS =====================
async function loadUsers() {

  try {

    const res = await fetch('/api/admin/users', {
      headers: { Authorization: 'Bearer ' + token }
    });

    const users = await res.json();

    let html = '<h2>Usuarios</h2>';

    users.forEach(u => {
      html += `
        <div class="card">
          <b>${u.username}</b><br>
          💰 Créditos: ${u.credits}
        </div>
      `;
    });

    document.getElementById('data').innerHTML = html;

  } catch (err) {
    alert("Error cargando usuarios");
  }
}


// ===================== LOGOUT =====================
function logout() {
  localStorage.clear();
  window.location.href = '/';
}


// INIT
loadStats();

</script>

</body>
</html>
