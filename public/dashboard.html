<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
  display:flex;
}

.sidebar {
  width:240px;
  background:#020617;
  padding:20px;
}

.sidebar h2 { color:#38bdf8; }

.sidebar button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  background:#111827;
  border:none;
  color:white;
  cursor:pointer;
}

.sidebar button:hover {
  background:linear-gradient(90deg,#38bdf8,#6366f1);
}

.content { flex:1; padding:30px; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}

.card {
  background:#111827;
  border-radius:16px;
  padding:20px;
}

.market-btn {
  padding:10px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

.back-btn {
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
  margin-bottom:20px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>NEXORA</h2>
  <button onclick="loadStats()">📊 Dashboard</button>
  <button onclick="loadProducts()">🛒 Marketplace</button>
  <button onclick="logout()">🚪 Salir</button>
</div>

<div class="content">
  <h1 id="title"></h1>
  <div id="data"></div>
</div>

<script>

const token = localStorage.getItem('token');

if (!token) location.href="/login.html";


// ================= DASHBOARD =================
async function loadStats(){

  document.getElementById("title").innerText="Dashboard";

  let data;

  try{
    const res = await fetch('/api/dashboard',{
      headers:{Authorization:"Bearer "+token}
    });

    if(!res.ok) throw new Error();

    data = await res.json();

  }catch{
    // 🔥 fallback si backend falla
    data = {
      sales:0,
      users:0,
      credits:100,
      plan:"Básico",
      expire:"2026-05-12"
    };
  }

  let expireDate = new Date(data.expire);
  let today = new Date();
  let days = Math.ceil((expireDate - today)/(1000*60*60*24));

  let color = days>0 ? "#22c55e" : "#ef4444";
  let estado = days>0 ? "Activo" : "Expirado";

  document.getElementById("data").innerHTML=`
    <div class="grid">

      <div class="card">
        💰 Ventas
        <h2>$${data.sales}</h2>
      </div>

      <div class="card">
        👤 Usuarios
        <h2>${data.users}</h2>
      </div>

      <div class="card">
        💳 Créditos
        <h2 style="color:#4ade80">$${data.credits}</h2>
      </div>

      <div class="card">
        📅 Suscripción<br><br>

        <b>${data.plan}</b><br>
        ${expireDate.toLocaleDateString()}<br><br>

        <span style="
          width:10px;
          height:10px;
          display:inline-block;
          border-radius:50%;
          background:${color};
        "></span>

        <b style="color:${color}"> ${estado}</b><br><br>

        ⏳ ${days>0 ? days+" días restantes" : "Vencido"}

      </div>

    </div>
  `;
}


// ================= PRODUCTS =================
async function loadProducts(){

  document.getElementById("title").innerText="Marketplace";

  let products=[];

  try{
    const res = await fetch('/api/products',{
      headers:{Authorization:"Bearer "+token}
    });

    if(res.ok){
      products = await res.json();
    }

  }catch{}

  document.getElementById("data").innerHTML=`

    <button class="back-btn" onclick="loadStats()">← Volver</button>

    <div class="grid">
      ${products.map(p=>`
        <div class="card">
          <h3>${p.name}</h3>
          <b>$${p.price}</b>
        </div>
      `).join("") || "Sin productos"}
    </div>

  `;
}


// ================= LOGOUT =================
function logout(){
  localStorage.clear();
  location.href="/";
}

loadStats();

</script>

</body>
</html>
