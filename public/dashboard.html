<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nexora Panel</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#020617;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#020617;
  padding:20px;
}
.sidebar h2{color:#38bdf8;}
.sidebar button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#111827;
  color:white;
  cursor:pointer;
}
.sidebar button:hover{
  background:#2563eb;
}

/* CONTENT */
.content{
  flex:1;
  padding:30px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:#111827;
  padding:15px;
  border-radius:15px;
}

/* BOTONES */
.btn{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.green{background:#22c55e;}
.blue{background:#3b82f6;}
.red{background:#ef4444;}

/* FORM */
input, textarea{
  width:100%;
  margin-top:8px;
  padding:10px;
  border-radius:8px;
  border:none;
}

.upload{
  border:2px dashed #38bdf8;
  padding:20px;
  text-align:center;
  margin-top:10px;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:#111827;
  padding:20px;
  border-radius:15px;
  width:300px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>NEXORA</h2>
  <button onclick="loadDashboard()">📊 Dashboard</button>
  <button onclick="loadMarketplace()">🛒 Marketplace</button>
  <button onclick="logout()">🚪 Salir</button>
</div>

<div class="content">
  <h1 id="title"></h1>
  <div id="app"></div>
</div>

<div id="modal"></div>

<script>

const token = localStorage.getItem('token');

// ================= DASHBOARD =================
async function loadDashboard(){
  document.getElementById("title").innerText="Dashboard";

  document.getElementById("app").innerHTML=`
    <div class="card">Panel listo ✔</div>
  `;
}

// ================= MARKETPLACE =================
async function loadMarketplace(){

  document.getElementById("title").innerText="Marketplace";

  let products=[];

  try{
    const res = await fetch('/api/products',{
      headers:{Authorization:"Bearer "+token}
    });

    if(res.ok) products = await res.json();

  }catch{}

  document.getElementById("app").innerHTML=`

    <button class="btn blue" onclick="loadDashboard()">← Volver</button>

    <div class="card" style="margin-top:20px">
      <h3>➕ Crear Producto</h3>

      <input id="name" placeholder="Nombre">
      <input id="price" placeholder="Precio">

      <div class="upload" onclick="file.click()">📂 Subir imagen</div>
      <input type="file" id="file" hidden>

      <img id="preview" style="width:100%;margin-top:10px;border-radius:10px">

      <textarea id="desc" placeholder="Descripción"></textarea>

      <button class="btn green" onclick="createProduct()">Crear</button>
    </div>

    <div class="grid" style="margin-top:20px">
      ${products.map(p=>`
        <div class="card">
          <h3>${p.name}</h3>
          <p>${p.description||""}</p>
          <b>$${p.price}</b><br><br>

          ${p.image ? `<img src="${p.image}" style="width:100%;border-radius:10px">` : ""}

          <br><br>

          <button class="btn blue" onclick="openEdit(${p.id})">✏️</button>
        </div>
      `).join("")}
    </div>
  `;

  document.getElementById("file").onchange = e=>{
    const file = e.target.files[0];
    if(file){
      document.getElementById("preview").src = URL.createObjectURL(file);
    }
  };
}

// ================= CREATE =================
async function createProduct(){

  const form = new FormData();

  form.append("name",document.getElementById("name").value);
  form.append("price",document.getElementById("price").value);
  form.append("description",document.getElementById("desc").value);

  const file = document.getElementById("file").files[0];
  if(file) form.append("image",file);

  await fetch('/api/products',{
    method:'POST',
    headers:{Authorization:"Bearer "+token},
    body:form
  });

  loadMarketplace();
}

// ================= EDIT MODAL =================
function openEdit(id){

  document.getElementById("modal").innerHTML=`
    <div class="modal">
      <div class="modal-box">

        <h3>Editar Producto</h3>

        <input id="editName" placeholder="Nombre">
        <input id="editPrice" placeholder="Precio">

        <input type="file" id="editFile">

        <textarea id="editDesc"></textarea>

        <br><br>

        <button class="btn green" onclick="updateProduct(${id})">Guardar</button>
        <button class="btn red" onclick="deleteProduct(${id})">Eliminar</button>
        <button class="btn" onclick="closeModal()">Cerrar</button>

      </div>
    </div>
  `;
}

function closeModal(){
  document.getElementById("modal").innerHTML="";
}

// ================= UPDATE =================
async function updateProduct(id){

  const form = new FormData();

  form.append("name",document.getElementById("editName").value);
  form.append("price",document.getElementById("editPrice").value);
  form.append("description",document.getElementById("editDesc").value);

  const file = document.getElementById("editFile").files[0];
  if(file) form.append("image",file);

  await fetch('/api/products/'+id,{
    method:'PUT',
    headers:{Authorization:"Bearer "+token},
    body:form
  });

  closeModal();
  loadMarketplace();
}

// ================= DELETE =================
async function deleteProduct(id){

  await fetch('/api/products/'+id,{
    method:'DELETE',
    headers:{Authorization:"Bearer "+token}
  });

  closeModal();
  loadMarketplace();
}

// ================= LOGOUT =================
function logout(){
  localStorage.clear();
  location.href="/";
}

loadMarketplace();

</script>

</body>
</html>
