<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  display: flex;
}

.sidebar {
  width: 240px;
  background: rgba(2, 6, 23, 0.9);
  padding: 20px;
}

.sidebar h2 {
  color: #38bdf8;
}

.sidebar button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  border: none;
  color: white;
  cursor: pointer;
}

.sidebar button:hover {
  background: linear-gradient(90deg, #38bdf8, #6366f1);
}

.content {
  flex: 1;
  padding: 30px;
}

.card {
  background: rgba(255,255,255,0.03);
  border-radius: 16px;
  padding: 20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}

.market-btn {
  padding: 12px;
  border-radius: 10px;
  background: linear-gradient(90deg, #22c55e, #4ade80);
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.back-btn {
  margin-bottom: 20px;
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg,#38bdf8,#6366f1);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.drop {
  border:2px dashed #38bdf8;
  padding:20px;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>NEXORA</h2>
  <button onclick="loadStats()">📊 Estadísticas</button>
  <button onclick="loadProducts()">🛒 Marketplace</button>
  <button onclick="logout()">🚪 Salir</button>
</div>

<div class="content">
  <h1 id="title"></h1>
  <div id="data"></div>
</div>

<script>

const token = localStorage.getItem('token');
let imageBase64 = "";

if (!token) location.href = "/login.html";

document.getElementById("title").innerText = "Dashboard Super Reseller";


// ===================== DASHBOARD =====================
async function loadStats() {

  document.getElementById('data').innerHTML = `
    <div class="card">
      <h3>Bienvenido al panel</h3>
      <button class="market-btn" onclick="loadProducts()">Ir al Marketplace</button>
    </div>
  `;
}


// ===================== MARKET =====================
async function loadProducts() {

  document.getElementById("title").innerText = "Marketplace";

  const res = await fetch('/api/products', {
    headers: { Authorization: 'Bearer ' + token }
  });

  const products = await res.json();

  document.getElementById('data').innerHTML = `

    <button class="back-btn" onclick="loadStats()">← Volver</button>

    <div class="card">
      <h3>➕ Crear Producto</h3>

      <input id="name" placeholder="Nombre" style="width:100%;margin:5px;padding:10px;border-radius:8px;">
      <input id="price" type="number" placeholder="Precio" style="width:100%;margin:5px;padding:10px;border-radius:8px;">

      <div class="drop" id="dropZone">
        📂 Arrastra imagen o haz click
        <input type="file" id="fileInput" hidden>
      </div>

      <img id="preview" style="width:100%;max-height:200px;margin-top:10px;border-radius:10px;display:none;">

      <textarea id="desc" placeholder="Descripción" style="width:100%;margin:5px;padding:10px;border-radius:8px;"></textarea>

      <button class="market-btn" onclick="createProduct()">Crear Producto</button>
    </div>

    <div class="grid">
      ${products.map(p => `
        <div class="card">
          ${p.image ? `<img src="${p.image}" style="width:100%;height:150px;object-fit:cover;border-radius:10px;">` : ""}
          <h3>${p.name}</h3>
          <p>${p.description || ""}</p>
          <b>$${p.price}</b>
        </div>
      `).join('')}
    </div>
  `;

  // activar subida imagen
  initUpload();
}


// ===================== UPLOAD =====================
function initUpload() {

  const dropZone = document.getElementById("dropZone");
  const input = document.getElementById("fileInput");
  const preview = document.getElementById("preview");

  dropZone.onclick = () => input.click();

  input.onchange = e => loadFile(e.target.files[0]);

  dropZone.ondrop = e => {
    e.preventDefault();
    loadFile(e.dataTransfer.files[0]);
  };

  dropZone.ondragover = e => e.preventDefault();

  function loadFile(file) {
    const reader = new FileReader();
    reader.onload = () => {
      imageBase64 = reader.result;
      preview.src = imageBase64;
      preview.style.display = "block";
    };
    reader.readAsDataURL(file);
  }
}


// ===================== CREATE =====================
async function createProduct() {

  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const description = document.getElementById("desc").value;

  const res = await fetch('/api/products', {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + token
    },
    body: JSON.stringify({
      name,
      price,
      description,
      image: imageBase64
    })
  });

  if (!res.ok) return alert("Error backend");

  alert("Producto creado");
  loadProducts();
}


// =====================
function logout() {
  localStorage.clear();
  location.href = "/";
}

loadStats();

</script>

</body>
</html>
