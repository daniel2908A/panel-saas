<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora</title>

<style>
body{
  font-family: Segoe UI;
  background: linear-gradient(135deg,#020617,#0f172a);
  color: white;
  display: flex;
  margin: 0;
}

.sidebar{
  width: 220px;
  padding: 20px;
}

.sidebar button{
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  background: #111827;
  border: none;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

.content{
  flex: 1;
  padding: 20px;
}

.grid{
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
  gap: 20px;
}

.card{
  background: linear-gradient(145deg,#0f172a,#020617);
  padding: 20px;
  border-radius: 16px;
}

.btn{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.btn-blue{ background:#3b82f6 }
.btn-green{ background:#22c55e }

.big-card{
  background:#111827;
  padding:20px;
  border-radius:14px;
}

.top-box{
  display:flex;
  gap:20px;
  margin-bottom:20px;
  flex-wrap:wrap;
}
</style>
</head>

<body>

<div class="sidebar">
  <button onclick="dashboard()">Panel Cliente</button>
  <button onclick="goMarket()">Marketplace</button>
</div>

<div class="content">
  <div id="app">Cargando...</div>
</div>

<script>

const token = localStorage.getItem("token");
if(!token) location.href="/login.html";

function getDaysLeft(date){
  if(!date) return "Sin fecha";
  const diff=Math.ceil((new Date(date)-new Date())/(1000*60*60*24));
  return diff>0?diff+" días":"Expirado";
}

// =====================
// DASHBOARD CLIENTE
// =====================
async function dashboard(){

  const res = await fetch('/api/dashboard',{
    headers:{ Authorization:"Bearer "+token }
  });

  const data = await res.json();

  const myProducts = await loadMyProducts();

  document.getElementById("app").innerHTML=`

  <h2>👤 Panel Cliente</h2>

  <div class="top-box">

    <div class="big-card">
      <h3>💳 Créditos</h3>
      <h1>$${data.credits}</h1>
    </div>

    <div class="big-card">
      <h3>⚡ Recargar</h3>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        ${[5,10,20,50,100].map(a=>`
          <button class="btn btn-green" onclick="recharge(${a})">$${a}</button>
        `).join("")}
      </div>
    </div>

    <div class="big-card">
      <h3>🛒 Comprar</h3>
      <button class="btn btn-blue" onclick="goMarket()">Ir al Marketplace</button>
    </div>

  </div>

  <div class="big-card">
    <h3>📦 Mis productos</h3>

    <div class="grid">
      ${myProducts}
    </div>
  </div>

  `;
}

// =====================
// PRODUCTOS COMPRADOS
// =====================
async function loadMyProducts(){
  try{

    const res = await fetch('/api/my-products',{
      headers:{ Authorization:"Bearer "+token }
    });

    const products = await res.json();

    if(products.length===0){
      return "<p>No tienes productos aún</p>";
    }

    return products.map(p=>{

      const days = getDaysLeft(p.expires_at);

      return `
        <div class="card">
          <h3>${p.name}</h3>
          <p>${p.description||''}</p>
          <p>⏳ ${days}</p>
          <p style="color:${days==='Expirado'?'#ef4444':'#22c55e'}">
            ${days==='Expirado'?'Expirado':'Activo'}
          </p>
        </div>
      `;

    }).join("");

  }catch{
    return "<p>Error cargando productos</p>";
  }
}

// =====================
// RECARGA
// =====================
function recharge(amount){
  alert("Recarga de $" + amount + " próximamente 💸");
}

// =====================
function goMarket(){
  window.location.href="/marketplace.html";
}

dashboard();

</script>

</body>
</html>
