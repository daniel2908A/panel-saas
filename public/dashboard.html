<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nexora</title>

<style>
body{font-family:Segoe UI;background:#020617;color:white;display:flex;}
.sidebar{width:220px;padding:20px;}
.sidebar button{width:100%;margin-top:10px;padding:10px;}
.content{flex:1;padding:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;}
.card{background:#111827;padding:15px;border-radius:10px;}
</style>
</head>

<body>

<div class="sidebar">
  <button onclick="dashboard()">Dashboard</button>
  <button onclick="market()">Marketplace</button>
</div>

<div class="content">
  <div id="app"></div>
</div>

<script>

const token = localStorage.getItem("token");

if(!token) location.href="/login.html";

// DASHBOARD
async function dashboard(){
  const res = await fetch('/api/dashboard',{
    headers:{Authorization:"Bearer "+token}
  });

  const data = await res.json();

  document.getElementById("app").innerHTML=`
    <div class="grid">
      <div class="card">💰 Ventas: ${data.sales}</div>
      <div class="card">👤 Usuarios: ${data.users}</div>
      <div class="card">💳 Créditos: $${data.credits}</div>
    </div>
  `;
}

// MARKETPLACE
async function market(){

  const res = await fetch('/api/products',{
    headers:{Authorization:"Bearer "+token}
  });

  const products = await res.json();

  document.getElementById("app").innerHTML=`

    <h3>Crear Producto</h3>

    <input id="name" placeholder="Nombre">
    <input id="price" placeholder="Precio">
    <input type="file" id="file">
    <textarea id="desc" placeholder="Descripción"></textarea>

    <button onclick="create()">Crear</button>

    <hr>

    <div class="grid">
      ${products.map(p=>`
        <div class="card">
          <h3>${p.name}</h3>
          <p>${p.description || ""}</p>
          <b>$${p.price}</b><br>
          ${p.image ? `<img src="${p.image}" width="100%">` : ""}
        </div>
      `).join("")}
    </div>
  `;
}

// CREAR PRODUCTO
async function create(){

  const form = new FormData();

  form.append("name",name.value);
  form.append("price",price.value);
  form.append("description",desc.value);

  if(file.files[0]){
    form.append("image",file.files[0]);
  }

  await fetch('/api/products',{
    method:'POST',
    headers:{Authorization:"Bearer "+token},
    body:form
  });

  market();
}

dashboard();

</script>

</body>
</html>
