<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora</title>

<style>
body{
  font-family: Segoe UI;
  background: linear-gradient(135deg,#020617,#0f172a);
  color: white;
  display: flex;
  margin: 0;
}

.sidebar{
  width: 220px;
  padding: 20px;
}

.sidebar button{
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  background: #111827;
  border: none;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  transition:0.3s;
}

.sidebar button:hover{
  background:#1f2937;
}

.content{
  flex: 1;
  padding: 20px;
}

.grid{
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
  gap: 20px;
}

.card{
  background: linear-gradient(145deg,#0f172a,#020617);
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
  transition:0.3s;
}

.card:hover{
  transform: translateY(-5px);
}

.waiting{
  text-align:center;
  margin-top:100px;
}

.top-box{
  display:flex;
  gap:20px;
  margin-bottom:20px;
}

.big-card{
  flex:1;
  background:#111827;
  padding:20px;
  border-radius:14px;
}

.btn{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
}

.btn-green{
  background:#22c55e;
}

.btn-blue{
  background:#3b82f6;
}
</style>
</head>

<body>

<div class="sidebar">
  <button onclick="dashboard()">Dashboard</button>
  <button onclick="market()">Marketplace</button>
</div>

<div class="content">
  <div id="app">Cargando...</div>
</div>

<script>

const token = localStorage.getItem("token");

if(!token){
  location.href = "/login.html";
}

async function checkStatus(){
  try{
    const res = await fetch('/api/users/me',{
      headers:{ Authorization: "Bearer " + token }
    });

    const user = await res.json();

    if(user.status !== "active"){
      document.getElementById("app").innerHTML = `
        <div class="waiting">
          <h2>⏳ Esperando confirmación de pago</h2>
          <p>Tu cuenta está en revisión</p>
          <h3 style="color:#22c55e">+56 9 4618 4516</h3>
        </div>
      `;
      return false;
    }

    return user;

  }catch(err){
    console.error(err);
    return false;
  }
}

function getDaysLeft(date){
  if(!date) return "Sin plan";
  const today = new Date();
  const exp = new Date(date);
  const diff = Math.ceil((exp - today) / (1000 * 60 * 60 * 24));
  return diff > 0 ? diff + " días" : "Expirado";
}

async function dashboard(){
  const user = await checkStatus();
  if(!user) return;

  const res = await fetch('/api/dashboard',{
    headers:{ Authorization: "Bearer " + token }
  });

  const data = await res.json();

  const referralLink = `${window.location.origin}/register.html?ref=${user.referral_code || ''}`;

  document.getElementById("app").innerHTML = `
    <div class="top-box">

      <div class="big-card">
        <h3>💳 Créditos</h3>
        <h2>$${data.credits}</h2>
        <button class="btn btn-green">Recargar</button>
      </div>

      <div class="big-card">
        <h3>📅 Plan</h3>
        <p>Activo</p>
        <p>Días restantes: ${getDaysLeft(user.plan_expiration)}</p>
      </div>

      <div class="big-card">
        <h3>💰 Ganancias</h3>
        <p>Ventas: $${user.earnings_sales || 0}</p>
        <p>Referidos: $${user.earnings_referrals || 0}</p>
      </div>

    </div>

    <div class="card">
      <h3>👥 Sistema de Referidos</h3>
      <p><b>Código:</b> ${user.referral_code || '---'}</p>

      <input value="${referralLink}" readonly style="width:100%;padding:8px;border-radius:6px;border:none">

      <button class="btn btn-blue" onclick="copyRef('${referralLink}')">
        Copiar link
      </button>
    </div>
  `;
}

function copyRef(link){
  navigator.clipboard.writeText(link);
  alert("Link copiado 🔥");
}

// presets
function preset(type){
  const presets = {
    Netflix:{name:"Cuenta Netflix Premium",desc:"Acceso completo a Netflix UHD",price:"5"},
    Disney:{name:"Cuenta Disney+",desc:"Películas y series Disney+",price:"4"},
    Spotify:{name:"Spotify Premium",desc:"Música sin anuncios",price:"3"}
  };

  const p = presets[type];
  document.getElementById("name").value = p.name;
  document.getElementById("desc").value = p.desc;
  document.getElementById("price").value = p.price;
}

async function market(){

  const ok = await checkStatus();
  if(!ok) return;

  const res = await fetch('/api/products',{
    headers:{ Authorization: "Bearer " + token }
  });

  const products = await res.json();

  document.getElementById("app").innerHTML = `
    <h2>🛒 Marketplace</h2>

    <div class="card">
      <h3>⚡ Productos rápidos</h3>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px">
        <button class="btn btn-blue" onclick="preset('Netflix')">Netflix</button>
        <button class="btn btn-blue" onclick="preset('Disney')">Disney+</button>
        <button class="btn btn-blue" onclick="preset('Spotify')">Spotify</button>
      </div>

      <h3>Crear Producto</h3>

      <input id="name" placeholder="Nombre">
      <input id="price" placeholder="Precio">
      <input type="file" id="file">
      <textarea id="desc" placeholder="Descripción"></textarea>

      <button class="btn btn-blue" onclick="create()">Crear</button>
    </div>

    <div class="grid">
      ${products.map(p => {

        let color = "linear-gradient(135deg,#3b82f6,#9333ea)";

        if(p.name.toLowerCase().includes("netflix")){
          color = "linear-gradient(135deg,#e50914,#b20710)";
        }

        if(p.name.toLowerCase().includes("disney")){
          color = "linear-gradient(135deg,#1e3a8a,#3b82f6)";
        }

        if(p.name.toLowerCase().includes("spotify")){
          color = "linear-gradient(135deg,#1db954,#15803d)";
        }

        return `
          <div class="card">

            <div style="
              height:120px;
              border-radius:12px;
              margin-bottom:10px;
              display:flex;
              align-items:center;
              justify-content:center;
              font-size:22px;
              font-weight:bold;
              background:${color};
              box-shadow:0 0 20px rgba(0,0,0,0.6);
              text-align:center;
              padding:10px;
            ">
              ${p.name}
            </div>

            <p style="opacity:0.7">${p.description || ""}</p>

            <h2>$${p.price}</h2>

            <div style="margin-top:10px;display:flex;gap:10px">
              <button class="btn btn-blue" onclick="editProduct(${p.id})">Editar</button>
              <button class="btn" style="background:#ef4444" onclick="deleteProduct(${p.id})">Eliminar</button>
            </div>

          </div>
        `;
      }).join("")}
    </div>
  `;
}

async function deleteProduct(id){
  if(!confirm("¿Eliminar producto?")) return;

  await fetch('/api/products/' + id,{
    method:'DELETE',
    headers:{ Authorization: "Bearer " + token }
  });

  alert("Producto eliminado");
  market();
}

function editProduct(id){
  alert("Editor próximo 🔥 ID: " + id);
}

async function create(){

  const ok = await checkStatus();
  if(!ok) return;

  const form = new FormData();

  form.append("name", document.getElementById("name").value);
  form.append("price", document.getElementById("price").value);
  form.append("description", document.getElementById("desc").value);

  const file = document.getElementById("file").files[0];
  if(file) form.append("image", file);

  await fetch('/api/products',{
    method:'POST',
    headers:{ Authorization: "Bearer " + token },
    body: form
  });

  alert("Producto creado");
  market();
}

// INIT
dashboard();

</script>

</body>
</html>
