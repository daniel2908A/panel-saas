<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  display: flex;
}

.sidebar {
  width: 240px;
  background: rgba(2, 6, 23, 0.9);
  padding: 20px;
}

.sidebar h2 { color: #38bdf8; }

.sidebar button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  border: none;
  color: white;
  cursor: pointer;
}

.sidebar button:hover {
  background: linear-gradient(90deg, #38bdf8, #6366f1);
}

.content { flex: 1; padding: 30px; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}

.card {
  background: rgba(255,255,255,0.03);
  border-radius: 16px;
  padding: 20px;
  transition:0.2s;
}

.card:hover {
  transform: translateY(-3px);
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.market-btn {
  padding: 10px 16px;
  border-radius: 10px;
  background: linear-gradient(90deg, #22c55e, #4ade80);
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.back-btn {
  margin-bottom: 20px;
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg,#38bdf8,#6366f1);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* FORM */
.form-row {
  display:flex;
  gap:10px;
}

input, textarea {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:10px;
}

/* DROP */
.drop {
  border:2px dashed #38bdf8;
  padding:25px;
  text-align:center;
  border-radius:12px;
  cursor:pointer;
  margin-top:10px;
  transition:0.2s;
}

.drop:hover {
  background: rgba(56,189,248,0.1);
}

/* MODAL */
.modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#020617;
  padding:20px;
  border-radius:12px;
  width:350px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>NEXORA</h2>
  <button onclick="loadStats()">📊 Estadísticas</button>
  <button onclick="loadProducts()">🛒 Marketplace</button>
  <button onclick="logout()">🚪 Salir</button>
</div>

<div class="content">
  <h1 id="title"></h1>
  <div id="data"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Editar Producto</h3>
    <input id="editName">
    <input id="editPrice" type="number">
    <textarea id="editDesc"></textarea>
    <br>
    <button onclick="updateProduct()" class="market-btn">Guardar</button>
    <button onclick="closeModal()">Cancelar</button>
  </div>
</div>

<script>

const token = localStorage.getItem('token');
let imageBase64 = "";
let editingId = null;

if (!token) location.href = "/login.html";


// ================= DASHBOARD =================
async function loadStats(){

  document.getElementById("title").innerText = "Dashboard";

  try{

    const res = await fetch('/api/dashboard',{
      headers:{Authorization:"Bearer "+token}
    });

    if(!res.ok) throw new Error("API FALLÓ");

    const data = await res.json();

    let expireText = "Sin fecha";
    let daysLeft = 0;
    let statusColor = "#ef4444";
    let statusText = "Sin plan";

    if(data.expire){

      const expireDate = new Date(data.expire);
      const today = new Date();

      const diff = expireDate - today;
      daysLeft = Math.ceil(diff / (1000*60*60*24));

      expireText = expireDate.toLocaleDateString();

      if(daysLeft > 0){
        statusColor = "#22c55e";
        statusText = "Activo";
      } else {
        statusText = "Expirado";
      }
    }

    document.getElementById('data').innerHTML = `
      <div class="grid">

        <div class="card">
          💰 Ventas
          <h2>$${data.sales || 0}</h2>
        </div>

        <div class="card">
          👤 Usuarios
          <h2>${data.users || 0}</h2>
        </div>

        <div class="card">
          💳 Créditos
          <h2 style="color:#4ade80;">$${data.credits ?? 0}</h2>
        </div>

        <div class="card">
          📅 Suscripción<br><br>

          <b>${data.plan || "SIN PLAN"}</b><br>
          ${expireText}<br><br>

          <span style="
            display:inline-block;
            width:10px;
            height:10px;
            border-radius:50%;
            background:${statusColor};
          "></span>

          <b style="color:${statusColor};"> ${statusText}</b>

          <br><br>

          ⏳ ${daysLeft > 0 ? daysLeft + " días restantes" : "Vencido"}

        </div>

      </div>
    `;

  }catch(err){

    console.log(err);

    document.getElementById('data').innerHTML = `
      <div class="card">
        ❌ Error cargando dashboard<br><br>
        Revisa /api/dashboard
      </div>
    `;
  }
}


// ================= MARKET =================
async function loadProducts(){

  document.getElementById("title").innerText = "Marketplace";

  const res = await fetch('/api/products',{
    headers:{Authorization:"Bearer "+token}
  });

  const products = await res.json();

  document.getElementById('data').innerHTML = `

    <button class="back-btn" onclick="loadStats()">← Volver</button>

    <div class="card">
      <h3>➕ Crear Producto</h3>

      <div class="form-row">
        <input id="name" placeholder="Nombre">
        <input id="price" type="number" placeholder="Precio">
      </div>

      <div class="drop" id="dropZone">
        📂 Click o arrastra imagen
        <input type="file" id="fileInput" hidden>
      </div>

      <img id="preview" style="width:100%;display:none;margin-top:10px;border-radius:10px;">

      <textarea id="desc" placeholder="Descripción"></textarea>

      <button class="market-btn" onclick="createProduct()">Crear Producto</button>
    </div>

    <div class="grid">
      ${products.map(p=>`
        <div class="card">
          ${p.image ? `<img src="${p.image}" style="width:100%;height:140px;object-fit:cover;border-radius:10px;">`:""}
          <h3>${p.name}</h3>
          <p>${p.description||""}</p>
          <b>$${p.price}</b>

          <div style="display:flex;gap:10px;margin-top:10px;">
            <button onclick='editProduct(${JSON.stringify(p)})'>✏️</button>
            <button onclick='deleteProduct(${p.id})'>🗑</button>
          </div>
        </div>
      `).join("")}
    </div>
  `;

  initUpload();
}


// ================= UPLOAD =================
function initUpload(){

  const dz = document.getElementById("dropZone");
  const input = document.getElementById("fileInput");
  const preview = document.getElementById("preview");

  dz.onclick = ()=> input.click();

  input.onchange = e=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      imageBase64 = reader.result;
      preview.src = imageBase64;
      preview.style.display = "block";
    };
    reader.readAsDataURL(e.target.files[0]);
  };
}


// ================= CREATE =================
async function createProduct(){

  const name = document.getElementById("name").value.trim();
  const price = document.getElementById("price").value.trim();
  const description = document.getElementById("desc").value.trim();

  if(!name || !price){
    return alert("Completa nombre y precio");
  }

  try{

    const res = await fetch('/api/products',{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        Authorization:"Bearer "+token
      },
      body:JSON.stringify({
        name,
        price:Number(price),
        description,
        image:imageBase64 || null
      })
    });

    const data = await res.json();

    if(!res.ok){
      console.log(data);
      return alert("Error backend: " + (data.message || "Error"));
    }

    alert("Producto creado correctamente");
    imageBase64 = "";
    loadProducts();

  }catch(err){
    console.log(err);
    alert("Error conexión backend");
  }
}

// ================= EDIT =================
function editProduct(p){
  editingId = p.id;
  document.getElementById("editName").value = p.name;
  document.getElementById("editPrice").value = p.price;
  document.getElementById("editDesc").value = p.description || "";
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}


// ================= UPDATE =================
async function updateProduct(){

  const res = await fetch(`/api/products/${editingId}`,{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({
      name:editName.value,
      price:editPrice.value,
      description:editDesc.value
    })
  });

  if(!res.ok) return alert("Error");

  alert("Actualizado");
  closeModal();
  loadProducts();
}


// ================= DELETE =================
async function deleteProduct(id){

  if(!confirm("Eliminar producto?")) return;

  const res = await fetch(`/api/products/${id}`,{
    method:"DELETE",
    headers:{Authorization:"Bearer "+token}
  });

  if(!res.ok) return alert("Error");

  alert("Eliminado");
  loadProducts();
}


// ================= LOGOUT =================
function logout(){
  localStorage.clear();
  location.href="/";
}


loadStats();

</script>

</body>
</html>
