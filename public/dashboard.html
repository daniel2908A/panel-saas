<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  display: flex;
}

.sidebar {
  width: 240px;
  background: rgba(2, 6, 23, 0.9);
  padding: 20px;
}

.sidebar h2 {
  color: #38bdf8;
}

.sidebar button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  border: none;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.sidebar button:hover {
  background: linear-gradient(90deg, #38bdf8, #6366f1);
}

.content {
  flex: 1;
  padding: 30px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.03);
  border-radius: 16px;
  padding: 20px;
}

.market-btn {
  margin-top: 20px;
  padding: 12px;
  border-radius: 10px;
  background: linear-gradient(90deg, #22c55e, #4ade80);
  border: none;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

.back-btn {
  margin-bottom: 20px;
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg,#38bdf8,#6366f1);
  color: white;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>NEXORA</h2>

  <button onclick="loadStats()">📊 Estadísticas</button>
  <button onclick="loadProducts()">🛒 Marketplace</button>
  <button onclick="logout()">🚪 Salir</button>
</div>

<div class="content">
  <h1 id="title"></h1>
  <div id="data"></div>
</div>

<script>

const token = localStorage.getItem('token');

if (!token) location.href = "/login.html";

document.getElementById("title").innerText = "Dashboard Super Reseller";


// ===================== STATS =====================
async function loadStats() {

  let data = { sales: 0, users: 0 };
  let user = { credits: 0 };

  try {
    const res = await fetch('/api/dashboard', {
      headers: { Authorization: 'Bearer ' + token }
    });
    if (res.ok) data = await res.json();
  } catch {}

  try {
    const userRes = await fetch('/api/user/me', {
      headers: { Authorization: 'Bearer ' + token }
    });
    if (userRes.ok) user = await userRes.json();
  } catch {}

  let dias = 0;
  let activo = false;

  if (user.expires_at) {
    dias = Math.floor((new Date(user.expires_at) - new Date()) / (1000*60*60*24));
    activo = new Date(user.expires_at) > new Date();
  }

  document.getElementById('data').innerHTML = `
    <div class="cards">

      <div class="card">
        <h3>💰 Ventas</h3>
        <p>$${data.sales || 0}</p>
      </div>

      <div class="card">
        <h3>👥 Usuarios</h3>
        <p>${data.users || 0}</p>
      </div>

      <div class="card">
        <h3>💸 Créditos</h3>
        <p>$${user.credits || 0}</p>
      </div>

      <div class="card">
        <h3>💳 Suscripción</h3>

        <p><b>${activo ? "PLAN ACTIVO" : "SIN PLAN"}</b></p>

        <p>
          ${user.expires_at 
            ? new Date(user.expires_at).toLocaleDateString() 
            : "No definido"}
        </p>

        <p style="color:${activo ? "#22c55e" : "#ef4444"};">
          ${activo ? "🟢 Activo" : "🔴 Sin plan"}
        </p>

        ${
          activo 
          ? `<p>⏳ ${dias} días restantes</p>` 
          : ""
        }

      </div>

    </div>

    <button class="market-btn" onclick="loadProducts()">
      🛒 Ir al Marketplace
    </button>
  `;
}


// ===================== MARKETPLACE =====================
async function loadProducts() {

  document.getElementById("title").innerText = "Marketplace";

  try {
    const res = await fetch('/api/products', {
      headers: { Authorization: 'Bearer ' + token }
    });

    if (!res.ok) {
      alert("❌ Error cargando productos");
      return;
    }

    const products = await res.json();

    document.getElementById('data').innerHTML = `

      <button class="back-btn" onclick="loadStats()">← Volver</button>

      <h2>🛒 Marketplace</h2>

      <!-- CREAR PRODUCTO -->
      <div class="card" style="margin-bottom:20px;">
        <h3>➕ Crear Producto</h3>

        <input id="name" placeholder="Nombre" style="width:100%;margin:5px 0;padding:10px;border-radius:8px;">
        <input id="price" type="number" placeholder="Precio" style="width:100%;margin:5px 0;padding:10px;border-radius:8px;">
        <input id="image" placeholder="URL Imagen" style="width:100%;margin:5px 0;padding:10px;border-radius:8px;">
        <textarea id="desc" placeholder="Descripción" style="width:100%;margin:5px 0;padding:10px;border-radius:8px;"></textarea>

        <button onclick="createProduct()" class="market-btn">
          Crear Producto
        </button>
      </div>

      <!-- LISTA -->
      ${products.map(p => `
        <div class="card" style="margin-bottom:15px;">
          ${p.image ? `<img src="${p.image}" style="width:100%;border-radius:10px;margin-bottom:10px;">` : ""}
          <h3>${p.name}</h3>
          <p>${p.description || "Sin descripción"}</p>
          <p><b>$${p.price}</b></p>
        </div>
      `).join('')}
    `;

  } catch (err) {
    console.error(err);
    alert("❌ Error servidor");
  }
}


// ===================== CREAR PRODUCTO =====================
async function createProduct() {

  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const image = document.getElementById("image").value;
  const description = document.getElementById("desc").value;

  try {
    const res = await fetch('/api/products', {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token
      },
      body: JSON.stringify({ name, price, image, description })
    });

    if (!res.ok) {
      alert("❌ Error creando producto (backend permisos)");
      return;
    }

    alert("✅ Producto creado");
    loadProducts();

  } catch (err) {
    console.error(err);
    alert("❌ Error servidor");
  }
}


// =====================
function logout() {
  localStorage.clear();
  location.href = "/";
}

loadStats();

</script>

</body>
</html>
