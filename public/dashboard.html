<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  display: flex;
}

.sidebar {
  width: 240px;
  background: rgba(2, 6, 23, 0.9);
  padding: 20px;
}

.sidebar h2 { color: #38bdf8; }

.sidebar button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  border: none;
  color: white;
  cursor: pointer;
}

.sidebar button:hover {
  background: linear-gradient(90deg, #38bdf8, #6366f1);
}

.content { flex: 1; padding: 30px; }

.card {
  background: rgba(255,255,255,0.03);
  border-radius: 16px;
  padding: 20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}

.market-btn {
  padding: 12px;
  border-radius: 10px;
  background: linear-gradient(90deg, #22c55e, #4ade80);
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.back-btn {
  margin-bottom: 20px;
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg,#38bdf8,#6366f1);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.drop {
  border:2px dashed #38bdf8;
  padding:20px;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
}

/* MODAL */
.modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#020617;
  padding:20px;
  border-radius:12px;
  width:350px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>NEXORA</h2>
  <button onclick="loadStats()">📊 Estadísticas</button>
  <button onclick="loadProducts()">🛒 Marketplace</button>
  <button onclick="logout()">🚪 Salir</button>
</div>

<div class="content">
  <h1 id="title"></h1>
  <div id="data"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Editar Producto</h3>
    <input id="editName" placeholder="Nombre" style="width:100%;margin:5px;padding:10px;">
    <input id="editPrice" type="number" placeholder="Precio" style="width:100%;margin:5px;padding:10px;">
    <textarea id="editDesc" placeholder="Descripción" style="width:100%;margin:5px;padding:10px;"></textarea>
    <input type="file" id="editImage">
    <br><br>
    <button onclick="updateProduct()" class="market-btn">Guardar</button>
    <button onclick="closeModal()" style="background:#444;color:white;padding:10px;border:none;">Cancelar</button>
  </div>
</div>

<script>

const token = localStorage.getItem('token');
let imageBase64 = "";
let editingId = null;

if (!token) location.href = "/login.html";

document.getElementById("title").innerText = "Dashboard Super Reseller";


// DASHBOARD
function loadStats(){
  document.getElementById('data').innerHTML = `
    <div class="card">
      <h3>Bienvenido</h3>
      <button class="market-btn" onclick="loadProducts()">Ir al Marketplace</button>
    </div>
  `;
}


// MARKET
async function loadProducts(){

  document.getElementById("title").innerText = "Marketplace";

  const res = await fetch('/api/products', {
    headers: { Authorization: 'Bearer ' + token }
  });

  const products = await res.json();

  document.getElementById('data').innerHTML = `
    <button class="back-btn" onclick="loadStats()">← Volver</button>

    <div class="card">
      <h3>➕ Crear Producto</h3>

      <input id="name" placeholder="Nombre">
      <input id="price" type="number" placeholder="Precio">

      <div class="drop" id="dropZone">
        📂 Subir imagen
        <input type="file" id="fileInput" hidden>
      </div>

      <img id="preview" style="width:100%;display:none;margin-top:10px;">

      <textarea id="desc" placeholder="Descripción"></textarea>

      <button class="market-btn" onclick="createProduct()">Crear</button>
    </div>

    <div class="grid">
      ${products.map(p => `
        <div class="card">

          ${p.image ? `<img src="${p.image}" style="width:100%;height:150px;object-fit:cover;">` : ""}

          <h3>${p.name}</h3>
          <p>${p.description || ""}</p>
          <b>$${p.price}</b>

          <div style="margin-top:10px;display:flex;gap:10px;">
            <button onclick='editProduct(${JSON.stringify(p)})'>✏️</button>
            <button onclick='deleteProduct(${p.id})'>🗑</button>
          </div>

        </div>
      `).join('')}
    </div>
  `;

  initUpload();
}


// UPLOAD
function initUpload(){
  const dz = document.getElementById("dropZone");
  const input = document.getElementById("fileInput");
  const preview = document.getElementById("preview");

  dz.onclick = ()=> input.click();

  input.onchange = e=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      imageBase64 = reader.result;
      preview.src = imageBase64;
      preview.style.display = "block";
    };
    reader.readAsDataURL(e.target.files[0]);
  };
}


// CREATE
async function createProduct(){

  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const description = document.getElementById("desc").value;

  const res = await fetch('/api/products',{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({name,price,description,image:imageBase64})
  });

  if(!res.ok) return alert("Error");

  alert("Creado");
  loadProducts();
}


// EDIT
function editProduct(p){
  editingId = p.id;
  document.getElementById("editName").value = p.name;
  document.getElementById("editPrice").value = p.price;
  document.getElementById("editDesc").value = p.description || "";
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}


// UPDATE
async function updateProduct(){

  const name = document.getElementById("editName").value;
  const price = document.getElementById("editPrice").value;
  const description = document.getElementById("editDesc").value;

  const res = await fetch(`/api/products/${editingId}`,{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({name,price,description})
  });

  if(!res.ok) return alert("Error");

  alert("Actualizado");
  closeModal();
  loadProducts();
}


// DELETE
async function deleteProduct(id){

  if(!confirm("Eliminar?")) return;

  const res = await fetch(`/api/products/${id}`,{
    method:"DELETE",
    headers:{Authorization:"Bearer "+token}
  });

  if(!res.ok) return alert("Error");

  alert("Eliminado");
  loadProducts();
}


// LOGOUT
function logout(){
  localStorage.clear();
  location.href="/";
}

loadStats();

</script>

</body>
</html>
