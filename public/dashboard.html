<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
    }

    .sidebar {
      width: 220px;
      background: #020617;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      color: #38bdf8;
    }

    .sidebar button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: transparent;
      border: 1px solid #38bdf8;
      color: #38bdf8;
      cursor: pointer;
      border-radius: 8px;
    }

    .content {
      flex: 1;
      padding: 20px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: #020617;
      padding: 20px;
      border-radius: 10px;
    }

    .card h3 {
      color: #38bdf8;
    }

    .status-ok { color: #22c55e; }
    .status-warn { color: orange; }
    .status-bad { color: red; }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button.activate {
      margin-top: 10px;
      background: #22c55e;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <h2>NEXORA</h2>

    <button onclick="loadStats()">📊 Estadísticas</button>
    <button onclick="loadUsers()">👥 Usuarios</button>
    <button onclick="loadProducts()">📦 Productos</button>
    <button onclick="logout()">🚪 Salir</button>
  </div>

  <div class="content">
    <h1 id="title">Dashboard</h1>
    <div id="data"></div>
  </div>

<script>

const token = localStorage.getItem('token');
const role = localStorage.getItem('role');

if (!token) {
  window.location.href = "/login.html";
}

if (!role) {
  alert("Error de sesión");
  window.location.href = "/login.html";
}

const title = document.getElementById("title");

if (role === "admin") {
  title.innerText = "Dashboard Admin";
} else if (role === "super_reseller") {
  title.innerText = "Dashboard Super Reseller";
} else {
  title.innerText = "Dashboard Usuario";
}

async function loadStats() {

  const url = role === "admin" 
    ? '/api/admin/stats' 
    : '/api/dashboard';

  const res = await fetch(url, {
    headers: { Authorization: 'Bearer ' + token }
  });

  const data = await res.json();

  // 🔥 ESTE ES EL IMPORTANTE
  const userRes = await fetch('/api/user/me', {
    headers: { Authorization: 'Bearer ' + token }
  });

  const user = await userRes.json();

  let plan = user.plan || "Sin plan";
  let exp = "No definido";
  let days = "-";
  let statusText = "";
  let statusClass = "";

  if (user.expires_at) {
    const expDate = new Date(user.expires_at);
    const today = new Date();

    const diff = expDate - today;
    const d = Math.ceil(diff / (1000 * 60 * 60 * 24));

    exp = expDate.toLocaleDateString();
    days = d;

    if (d <= 0) {
      statusText = "❌ Vencido";
      statusClass = "status-bad";
    } else if (d <= 3) {
      statusText = "⚠️ Por expirar";
      statusClass = "status-warn";
    } else {
      statusText = "✅ Activo";
      statusClass = "status-ok";
    }
  }

  let adminSection = "";

  if (role === "admin") {
    adminSection = `
      <div class="card">
        <h3>⚡ Activar Usuario</h3>

        <input id="emailActivate" placeholder="Correo del usuario">

        <select id="planActivate">
          <option value="1m">1 mes</option>
          <option value="3m">3 meses</option>
          <option value="6m">6 meses</option>
          <option value="12m">1 año</option>
        </select>

        <button class="activate" onclick="activarUsuario()">Activar</button>
      </div>
    `;
  }

  document.getElementById('data').innerHTML = `
    <div class="cards">

      <div class="card">
        <h3>💰 Ventas</h3>
        <p>$${data.sales || 0}</p>
      </div>

      <div class="card">
        <h3>👥 Usuarios</h3>
        <p>${data.users || 0}</p>
      </div>

      <div class="card">
        <h3>💸 Créditos</h3>
        <p>$${user.credits || 0}</p> <!-- 🔥 FIX AQUÍ -->
      </div>

      <div class="card">
        <h3>💳 Suscripción</h3>
        <p>Plan: ${plan}</p>
        <p>Expira: ${exp}</p>
        <p>Días restantes: ${days}</p>
        <p class="${statusClass}">${statusText}</p>
        <br>
        <button onclick="window.location.href='/payment.html'">
          🔄 Renovar Plan
        </button>
      </div>

      ${adminSection}

    </div>
  `;
}

async function activarUsuario() {

  if (role !== "admin") {
    alert("No autorizado");
    return;
  }

  const email = document.getElementById("emailActivate").value;
  const plan = document.getElementById("planActivate").value;

  const res = await fetch('/api/admin/activate-user', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      Authorization: 'Bearer ' + token
    },
    body: JSON.stringify({ email, plan })
  });

  const data = await res.json();
  alert(data.message || data.error);
}

async function loadUsers() {

  if (role !== "admin") {
    alert("No autorizado");
    return;
  }

  const res = await fetch('/api/admin/users', {
    headers: { Authorization: 'Bearer ' + token }
  });

  const users = await res.json();

  let html = '<h2>Usuarios</h2>';

  users.forEach(u => {
    html += `
      <div class="card">
        <b>${u.username}</b> (${u.role})<br>
        💰 Créditos: ${u.credits}<br>
      </div>
    `;
  });

  document.getElementById('data').innerHTML = html;
}

async function loadProducts() {
  const res = await fetch('/api/products', {
    headers: { Authorization: 'Bearer ' + token }
  });

  const products = await res.json();

  let html = '<h2>Productos</h2>';

  products.forEach(p => {
    html += `<p>${p.name}</p>`;
  });

  document.getElementById('data').innerHTML = html;
}

function logout() {
  localStorage.removeItem('token');
  localStorage.removeItem('role');
  window.location.href = '/';
}

loadStats();

</script>

</body>
</html>
