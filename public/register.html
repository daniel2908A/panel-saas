<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro - Nexora Panel</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding: 30px;
  border-radius: 20px;
  width: 350px;
  box-shadow: 0 0 30px rgba(0,0,0,0.4);
}

h2 {
  color: white;
  text-align: center;
  margin-bottom: 20px;
}

.tabs {
  display: flex;
  margin-bottom: 20px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  overflow: hidden;
}

.tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  cursor: pointer;
  color: #ccc;
  transition: 0.3s;
}

.tab.active {
  background: linear-gradient(135deg, #3b82f6, #9333ea);
  color: white;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border: none;
  border-radius: 10px;
  background: rgba(255,255,255,0.1);
  color: white;
}

input::placeholder {
  color: #aaa;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #3b82f6, #9333ea);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

.info {
  text-align: center;
  font-size: 12px;
  color: #aaa;
  margin-bottom: 10px;
}

.fade {
  animation: fade 0.3s ease;
}

@keyframes fade {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container fade">

<h2>Crear Cuenta</h2>

<div class="tabs">
  <div class="tab active" onclick="setRole('reseller', this)">Reseller</div>
  <div class="tab" onclick="setRole('super_reseller', this)">Super Reseller</div>
</div>

<div class="info" id="infoText">
  Acceso básico para vender productos
</div>

<form id="form">
  <input type="text" id="username" placeholder="Usuario" required>
  <input type="email" id="email" placeholder="Correo" required>
  <input type="password" id="password" placeholder="Contraseña" required>
  <input type="text" id="ref" placeholder="Código de referido (opcional)">
  <button type="submit">Crear Cuenta</button>
</form>

</div>

<script>
let role = "reseller";

function setRole(r, el) {
  role = r;

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');

  const info = document.getElementById('infoText');

  if (r === 'super_reseller') {
    info.innerText = "Nivel avanzado con sistema multinivel 🚀";
  } else {
    info.innerText = "Acceso básico para vender productos";
  }

  document.querySelector('.container').classList.remove('fade');
  void document.querySelector('.container').offsetWidth;
  document.querySelector('.container').classList.add('fade');
}

// REFERIDO DESDE URL
const urlParams = new URLSearchParams(window.location.search);
const refFromUrl = urlParams.get('ref');

if (refFromUrl) {
  document.getElementById('ref').value = refFromUrl;
}

// REGISTRO
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const username = document.getElementById("username").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const referral = document.getElementById("ref").value;

  const res = await fetch("/api/auth/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username,
      email,
      password,
      role,
      referral // 🔥 CORREGIDO
    })
  });

  const data = await res.json();

  alert(data.message || JSON.stringify(data));
});
</script>

</body>
</html>
