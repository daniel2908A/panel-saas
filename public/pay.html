<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pagar - Nexora</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #020617, #0f172a);
  font-family: 'Segoe UI', sans-serif;
  color: white;
}

/* CONTENEDOR */
.container {
  max-width: 480px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

/* CARD */
.card {
  background: rgba(30, 41, 59, 0.95);
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 0 40px rgba(0,255,150,0.15);
}

/* TITULO */
h2 {
  margin-bottom: 10px;
}

/* PLAN */
.plan {
  font-size: 14px;
  color: #94a3b8;
  margin-bottom: 20px;
}

/* QR */
img {
  width: 100%;
  max-width: 300px;
  margin: 20px auto;
  display: block;
  border-radius: 12px;
}

/* CAJA BINANCE */
.binance-box {
  background: #020617;
  padding: 18px;
  border-radius: 12px;
  margin-top: 15px;
}

/* TEXTO ID */
.binance-box p:first-child {
  font-size: 13px;
  color: #94a3b8;
}

.binance-box p:last-child {
  font-size: 20px;
  font-weight: bold;
}

/* BOTONES EXTRA */
.actions {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.actions button {
  flex: 1;
  padding: 10px;
  font-size: 13px;
}

/* INPUT */
input {
  width: 100%;
  padding: 10px;
  margin-top: 20px;
  background: #0f172a;
  border: 1px solid #334155;
  color: white;
  border-radius: 8px;
}

/* BOTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.03);
  box-shadow: 0 0 10px #22c55e;
}

/* RESPONSIVE */
@media (max-width: 480px) {
  img {
    max-width: 260px;
  }
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>💳 Pago Binance</h2>

<p class="plan" id="planInfo"></p>

<img src="/img/binance-qr.png" alt="QR Binance">

<div class="binance-box">
  <p>Binance Pay ID</p>
  <p id="binanceId">1195665274</p>
</div>

<div class="actions">
  <button onclick="copiarID()">📋 Copiar</button>
  <button onclick="abrirBinance()">🚀 Abrir App</button>
</div>

<p style="margin-top:15px;">Escanea o paga manual con Binance Pay</p>

<input type="file" id="proof">

<button onclick="enviar()">Enviar comprobante</button>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const plan = params.get("plan");

document.getElementById("planInfo").innerText = "Plan seleccionado: " + plan;

/* COPIAR ID */
function copiarID() {
  const id = document.getElementById("binanceId").innerText;
  navigator.clipboard.writeText(id);
  alert("ID copiado");
}

/* DETECTAR MOVIL */
function esMovil() {
  return /Android|iPhone|iPad/i.test(navigator.userAgent);
}

/* ABRIR BINANCE */
function abrirBinance() {
  if (esMovil()) {
    window.location.href = "bnc://app.binance.com";
  } else {
    alert("Abre Binance en tu teléfono para escanear");
  }
}

/* ENVIAR COMPROBANTE */
async function enviar() {

  const file = document.getElementById("proof").files[0];

  if (!file) {
    alert("Sube comprobante");
    return;
  }

  const formData = new FormData();
  formData.append("file", file);

  const token = localStorage.getItem("token");

  await fetch("/api/payment/upload", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token
    },
    body: formData
  });

  const numero = "56946184516";

  const mensaje = encodeURIComponent(
    "Hola, ya realicé el pago en Nexora Panel (" + plan + ")"
  );

  window.open(`https://wa.me/${numero}?text=${mensaje}`, "_blank");

  alert("Comprobante enviado correctamente");

  window.location.href = "/dashboard.html";
}

</script>

</body>
</html>
