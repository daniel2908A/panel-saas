<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagar - Nexora</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #020617, #0f172a);
  font-family: 'Segoe UI', sans-serif;
  color: white;
}

.container {
  max-width: 480px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

.card {
  background: rgba(30, 41, 59, 0.95);
  padding: 25px;
  border-radius: 20px;
}

img {
  width: 100%;
  max-width: 280px;
  margin: 20px auto;
  border-radius: 10px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h2>💳 Pago Binance</h2>

    <p id="planInfo"></p>
    <p id="emailInfo"></p>

    <img src="/img/binance-qr.png">

    <p><strong>ID Binance:</strong> 1195665274</p>

    <input type="file" id="proof">

    <button onclick="enviar()">Enviar comprobante</button>

  </div>
</div>

<script>

// =======================
// DATOS
// =======================
const params = new URLSearchParams(window.location.search);
const plan = params.get("plan") || "No definido";
const email = params.get("email") || "No definido";

document.getElementById("planInfo").innerText = "Plan: " + plan;
document.getElementById("emailInfo").innerText = "Usuario: " + email;

// =======================
// ENVIAR COMPROBANTE
// =======================
async function enviar(){

  try{
    const file = document.getElementById("proof").files[0];

    if (!file) {
      alert("Sube comprobante");
      return;
    }

    const formData = new FormData();
    formData.append("file", file);
    formData.append("email", email); // 🔥 clave

    const res = await fetch("/api/deposits/payment-proof", {
      method: "POST",
      body: formData
    });

    if(!res.ok) throw new Error("Error subiendo comprobante");

    alert("Comprobante enviado correctamente");

    window.location.href = "/waiting.html";

  }catch(err){
    console.error(err);
    alert("Error enviando comprobante");
  }
}

</script>

</body>
</html>
