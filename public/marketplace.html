<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Marketplace Nexora</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  align-items:center;
}

.logo{
  font-size:22px;
  font-weight:bold;
}

.back{
  background:#111827;
  padding:10px 15px;
  border-radius:8px;
  cursor:pointer;
}

/* TITULO */
.title{
  text-align:center;
  margin-top:20px;
}

.subtitle{
  color:#94a3b8;
  margin-top:10px;
}

/* CATEGORIAS */
.categories{
  display:flex;
  gap:15px;
  justify-content:center;
  flex-wrap:wrap;
  margin:30px;
}

.cat{
  padding:12px 20px;
  border-radius:10px;
  background:#111827;
  cursor:pointer;
  transition:0.2s;
}

.cat:hover{
  background:#3b82f6;
}

.active{
  background:#3b82f6;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  padding:30px;
}

/* PRODUCTO */
.card{
  background:#020617;
  border-radius:16px;
  padding:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.banner{
  height:120px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:18px;
}

.price{
  font-size:22px;
  margin:10px 0;
}

.btn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.buy{
  background:#22c55e;
}

/* TAG */
.tag{
  font-size:12px;
  color:#94a3b8;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">🛒 Nexora Marketplace</div>
  <div class="back" onclick="goHome()">⬅ Volver</div>
</div>

<div class="title">
  <h1>Productos disponibles</h1>
  <div class="subtitle">Ofrecidos por nuestros resellers verificados</div>
</div>

<!-- CATEGORIAS -->
<div class="categories">
  <div class="cat active" onclick="filterCat('all', this)">Todos</div>
  <div class="cat" onclick="filterCat('streaming', this)">🎬 Streaming</div>
  <div class="cat" onclick="filterCat('music', this)">🎵 Música</div>
  <div class="cat" onclick="filterCat('iptv', this)">📺 IPTV</div>
  <div class="cat" onclick="filterCat('tools', this)">🧰 Herramientas</div>
</div>

<!-- PRODUCTOS -->
<div class="grid" id="products"></div>

<script>

function goHome(){
  window.location.href="/";
}

let allProducts=[];

// cargar productos
async function loadProducts(){
  try{
    const res = await fetch('/api/products');
    const data = await res.json();

    allProducts = data;

    renderProducts(data);

  }catch(err){
    document.getElementById("products").innerHTML="Error cargando productos";
  }
}

// render
function renderProducts(products){

  if(products.length === 0){
    document.getElementById("products").innerHTML="<p>No hay productos</p>";
    return;
  }

  let html="";

  products.forEach(p=>{

    html+=`
      <div class="card">

        <div class="banner" style="
          background: linear-gradient(135deg, ${p.color || '#3b82f6'}, #000);
          box-shadow: 0 0 15px ${p.color || '#3b82f6'};
        ">
          ${p.name || 'Producto'}
        </div>

        <div class="tag">Vendido por reseller</div>

        <p>${p.description || ''}</p>

        <div class="price">$${p.price || 0}</div>

        <button class="btn buy" onclick="buy(${p.id})">
          Comprar
        </button>

      </div>
    `;
  });

  document.getElementById("products").innerHTML=html;
}

// filtro
function filterCat(cat, el){

  document.querySelectorAll('.cat').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');

  if(cat === "all"){
    renderProducts(allProducts);
    return;
  }

  const filtered = allProducts.filter(p => p.category === cat);
  renderProducts(filtered);
}

// comprar (placeholder)
function buy(id){
  alert("Compra próximamente 💸");
}

// init
loadProducts();

</script>

</body>
</html>
