<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Marketplace Nexora</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  align-items:center;
}

.logo{ font-size:22px; font-weight:bold; }

.back{
  background:#111827;
  padding:10px 15px;
  border-radius:8px;
  cursor:pointer;
}

.title{text-align:center;margin-top:20px;}
.subtitle{color:#94a3b8;margin-top:10px;}

.categories{
  display:flex;
  gap:15px;
  justify-content:center;
  flex-wrap:wrap;
  margin:30px;
}

.cat{
  padding:12px 20px;
  border-radius:10px;
  background:#111827;
  cursor:pointer;
}

.active{ background:#3b82f6; }

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  padding:30px;
}

.card{
  background:#020617;
  border-radius:16px;
  padding:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.banner{
  height:120px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.price{ font-size:22px;margin:10px 0; }

.btn{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.buy{ background:#22c55e; }

.tag{ font-size:12px;color:#94a3b8;margin-top:10px; }
</style>
</head>

<body>

<div class="header">
  <div class="logo">🛒 Nexora Marketplace</div>
  <div class="back" onclick="goHome()">⬅ Volver</div>
</div>

<div class="title">
  <h1>Productos disponibles</h1>
  <div class="subtitle">Ofrecidos por nuestros resellers</div>
</div>

<div class="categories">
  <div class="cat active" onclick="filterCat('all', this)">Todos</div>
  <div class="cat" onclick="filterCat('streaming', this)">🎬 Streaming</div>
  <div class="cat" onclick="filterCat('music', this)">🎵 Música</div>
  <div class="cat" onclick="filterCat('iptv', this)">📺 IPTV</div>
</div>

<div class="grid" id="products">Cargando...</div>

<script>

function goHome(){
  window.location.href="/";
}

let allProducts=[];

// 🔥 CARGA INTELIGENTE (esto soluciona tu error)
async function loadProducts(){
  try{

    let res;

    // intenta público primero
    try{
      res = await fetch('/api/products/public');
      if(!res.ok) throw "fail";
    }catch{
      // fallback privado con token
      const token = localStorage.getItem("token");

      res = await fetch('/api/products',{
        headers:{ Authorization:"Bearer "+token }
      });
    }

    const data = await res.json();

    if(!Array.isArray(data)){
      throw new Error("Formato incorrecto");
    }

    allProducts = data;

    renderProducts(data);

  }catch(err){
    console.error(err);
    document.getElementById("products").innerHTML="❌ No se pudieron cargar los productos";
  }
}

// render
function renderProducts(products){

  if(products.length===0){
    document.getElementById("products").innerHTML="No hay productos";
    return;
  }

  let html="";

  products.forEach(p=>{

    html+=`
      <div class="card">

        <div class="banner" style="
          background: linear-gradient(135deg, ${p.color||'#3b82f6'}, #000);
        ">
          ${p.name || 'Producto'}
        </div>

        <div class="tag">Vendido por reseller</div>

        <p>${p.description || ''}</p>

        <div class="price">$${p.price || 0}</div>

        <button class="btn buy" onclick="buy(${p.id})">
          Comprar
        </button>

      </div>
    `;
  });

  document.getElementById("products").innerHTML=html;
}

// filtro
function filterCat(cat, el){
  document.querySelectorAll('.cat').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');

  if(cat==="all"){
    renderProducts(allProducts);
  }else{
    renderProducts(allProducts.filter(p=>p.category===cat));
  }
}

// 💸 FLUJO REAL DE COMPRA
function buy(id){

  const token = localStorage.getItem("token");

  // no está logueado
  if(!token){
    alert("Debes crear cuenta primero");
    window.location.href="/register.html";
    return;
  }

  // está logueado → ir a panel a comprar
  window.location.href="/dashboard.html";
}

loadProducts();

</script>

</body>
</html>
